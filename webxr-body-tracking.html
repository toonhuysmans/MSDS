<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebXR Full Body Tracking — Soldier</title>
<style>
  body { margin: 0; background: #111; color: #fff; font-family: sans-serif; overflow: hidden; }
  #enterVR {
    position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
    padding: 16px 32px; font-size: 18px; background: #44aaff; color: #000;
    border: none; border-radius: 8px; cursor: pointer; z-index: 10;
  }
  #enterVR:disabled { opacity: 0.4; cursor: default; }
  #info {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    text-align: center; opacity: 0.7; font-size: 14px; max-width: 500px;
  }
  #loading {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    font-size: 20px; opacity: 0.6;
  }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="info">
  WebXR Full Body Tracking — Quest 3<br>
  <small>Requires: Quest Browser → chrome://flags → enable "WebXR Experiments"</small>
</div>
<div id="loading">Loading soldier model...</div>
<button id="enterVR" disabled>Enter VR</button>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const SOLDIER_URL = 'https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/models/gltf/Soldier.glb';
const MIRROR_Z = -2.0;

// ============================================================
// Mixamo bone name → WebXR body joint name mapping
// ============================================================
const MIXAMO_TO_XR = {
  'mixamorigHips': 'hips',
  'mixamorigSpine': 'spine-lower',
  'mixamorigSpine1': 'spine-middle',
  'mixamorigSpine2': 'spine-upper',
  'mixamorigNeck': 'neck',
  'mixamorigHead': 'head',
  // Left arm
  'mixamorigLeftShoulder': 'left-shoulder',
  'mixamorigLeftArm': 'left-arm-upper',
  'mixamorigLeftForeArm': 'left-arm-lower',
  'mixamorigLeftHand': 'left-hand-wrist',
  // Right arm
  'mixamorigRightShoulder': 'right-shoulder',
  'mixamorigRightArm': 'right-arm-upper',
  'mixamorigRightForeArm': 'right-arm-lower',
  'mixamorigRightHand': 'right-hand-wrist',
  // Left leg
  'mixamorigLeftUpLeg': 'left-upper-leg',
  'mixamorigLeftLeg': 'left-lower-leg',
  'mixamorigLeftFoot': 'left-foot-ankle',
  'mixamorigLeftToeBase': 'left-foot-ball',
  // Right leg
  'mixamorigRightUpLeg': 'right-upper-leg',
  'mixamorigRightLeg': 'right-lower-leg',
  'mixamorigRightFoot': 'right-foot-ankle',
  'mixamorigRightToeBase': 'right-foot-ball',
  // Left hand fingers
  'mixamorigLeftHandThumb1': 'left-hand-thumb-metacarpal',
  'mixamorigLeftHandThumb2': 'left-hand-thumb-phalanx-proximal',
  'mixamorigLeftHandThumb3': 'left-hand-thumb-phalanx-distal',
  'mixamorigLeftHandIndex1': 'left-hand-index-phalanx-proximal',
  'mixamorigLeftHandIndex2': 'left-hand-index-phalanx-intermediate',
  'mixamorigLeftHandIndex3': 'left-hand-index-phalanx-distal',
  'mixamorigLeftHandMiddle1': 'left-hand-middle-phalanx-proximal',
  'mixamorigLeftHandMiddle2': 'left-hand-middle-phalanx-intermediate',
  'mixamorigLeftHandMiddle3': 'left-hand-middle-phalanx-distal',
  'mixamorigLeftHandRing1': 'left-hand-ring-phalanx-proximal',
  'mixamorigLeftHandRing2': 'left-hand-ring-phalanx-intermediate',
  'mixamorigLeftHandRing3': 'left-hand-ring-phalanx-distal',
  'mixamorigLeftHandPinky1': 'left-hand-little-phalanx-proximal',
  'mixamorigLeftHandPinky2': 'left-hand-little-phalanx-intermediate',
  'mixamorigLeftHandPinky3': 'left-hand-little-phalanx-distal',
  // Right hand fingers
  'mixamorigRightHandThumb1': 'right-hand-thumb-metacarpal',
  'mixamorigRightHandThumb2': 'right-hand-thumb-phalanx-proximal',
  'mixamorigRightHandThumb3': 'right-hand-thumb-phalanx-distal',
  'mixamorigRightHandIndex1': 'right-hand-index-phalanx-proximal',
  'mixamorigRightHandIndex2': 'right-hand-index-phalanx-intermediate',
  'mixamorigRightHandIndex3': 'right-hand-index-phalanx-distal',
  'mixamorigRightHandMiddle1': 'right-hand-middle-phalanx-proximal',
  'mixamorigRightHandMiddle2': 'right-hand-middle-phalanx-intermediate',
  'mixamorigRightHandMiddle3': 'right-hand-middle-phalanx-distal',
  'mixamorigRightHandRing1': 'right-hand-ring-phalanx-proximal',
  'mixamorigRightHandRing2': 'right-hand-ring-phalanx-intermediate',
  'mixamorigRightHandRing3': 'right-hand-ring-phalanx-distal',
  'mixamorigRightHandPinky1': 'right-hand-little-phalanx-proximal',
  'mixamorigRightHandPinky2': 'right-hand-little-phalanx-intermediate',
  'mixamorigRightHandPinky3': 'right-hand-little-phalanx-distal',
};

// Reverse: XR joint → Mixamo bone name
const XR_TO_MIXAMO = {};
for (const [mix, xr] of Object.entries(MIXAMO_TO_XR)) XR_TO_MIXAMO[xr] = mix;

// Process order: parents MUST come before children so getWorldQuaternion() is correct
const BONE_ORDER_XR = [
  // Spine chain
  'hips', 'spine-lower', 'spine-middle', 'spine-upper', 'neck', 'head',
  // Left arm chain
  'left-shoulder', 'left-arm-upper', 'left-arm-lower', 'left-hand-wrist',
  // Left hand fingers (proximal → distal)
  'left-hand-thumb-metacarpal',    'left-hand-thumb-phalanx-proximal',    'left-hand-thumb-phalanx-distal',
  'left-hand-index-phalanx-proximal',  'left-hand-index-phalanx-intermediate',  'left-hand-index-phalanx-distal',
  'left-hand-middle-phalanx-proximal', 'left-hand-middle-phalanx-intermediate', 'left-hand-middle-phalanx-distal',
  'left-hand-ring-phalanx-proximal',   'left-hand-ring-phalanx-intermediate',   'left-hand-ring-phalanx-distal',
  'left-hand-little-phalanx-proximal', 'left-hand-little-phalanx-intermediate', 'left-hand-little-phalanx-distal',
  // Right arm chain
  'right-shoulder', 'right-arm-upper', 'right-arm-lower', 'right-hand-wrist',
  // Right hand fingers
  'right-hand-thumb-metacarpal',    'right-hand-thumb-phalanx-proximal',    'right-hand-thumb-phalanx-distal',
  'right-hand-index-phalanx-proximal',  'right-hand-index-phalanx-intermediate',  'right-hand-index-phalanx-distal',
  'right-hand-middle-phalanx-proximal', 'right-hand-middle-phalanx-intermediate', 'right-hand-middle-phalanx-distal',
  'right-hand-ring-phalanx-proximal',   'right-hand-ring-phalanx-intermediate',   'right-hand-ring-phalanx-distal',
  'right-hand-little-phalanx-proximal', 'right-hand-little-phalanx-intermediate', 'right-hand-little-phalanx-distal',
  // Leg chains
  'left-upper-leg',  'left-lower-leg',  'left-foot-ankle',  'left-foot-ball',
  'right-upper-leg', 'right-lower-leg', 'right-foot-ankle', 'right-foot-ball',
];

// --- Scene ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 100);
camera.position.set(0, 1.6, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.xr.enabled = true;
renderer.xr.setReferenceSpaceType('local-floor'); // y=0 is the physical floor
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(2, 4, 3);
scene.add(dirLight);

scene.add(new THREE.GridHelper(20, 40, 0x333333, 0x222222));

// --- Mirror surface ---
const mirrorSurface = new THREE.Mesh(
  new THREE.PlaneGeometry(2, 2.5),
  new THREE.MeshStandardMaterial({
    color: 0x667788, roughness: 0.05, metalness: 0.9,
    transparent: true, opacity: 0.12, side: THREE.DoubleSide
  })
);
mirrorSurface.position.set(0, 1.25, MIRROR_Z);
scene.add(mirrorSurface);

const frameMat = new THREE.MeshStandardMaterial({ color: 0x333344, roughness: 0.5, metalness: 0.3 });
const ft = 0.04;
[[0, 2.52, 2.08, ft], [0, -0.02, 2.08, ft], [-1.04, 1.25, ft, 2.58], [1.04, 1.25, ft, 2.58]]
  .forEach(([x, y, w, h]) => {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, ft), frameMat);
    m.position.set(x, y, MIRROR_Z);
    scene.add(m);
  });

// --- Soldier model state ---
let soldierModel = null;
let mirrorModel = null;
let bonesByXRJoint = {};         // xr joint name → THREE.Bone (main)
let mirrorBonesByXRJoint = {};   // xr joint name → THREE.Bone (mirror)

// Rest-pose data captured at load time (T-pose)
const boneRestLocal = {};              // xrJoint → THREE.Quaternion (bone local quat at T-pose)
const parentBoneRestWorld = {};        // xrJoint → THREE.Quaternion (parent world quat at T-pose)
const mirrorBoneRestLocal = {};
const mirrorParentBoneRestWorld = {};

// Natural model-space heights (used for scaling and grounding)
let soldierNaturalHeadY = 1.8;
let soldierNaturalToesY = 0.0;
let soldierNaturalHipsY = 0.95;

// --- T-pose calibration state ---
const calibRest = {};           // xrJoint → THREE.Quaternion at user T-pose
let isCalibrated = false;
let calibCountdownEnd = 0;
let thumbstickWasPressed = false;

const loader = new GLTFLoader();
loader.load(SOLDIER_URL, (gltf) => {
  document.getElementById('loading').style.display = 'none';

  // --- Main soldier (driven by body tracking) ---
  soldierModel = gltf.scene;
  soldierModel.visible = false;
  scene.add(soldierModel);

  soldierModel.traverse((child) => {
    if (child.isSkinnedMesh) {
      child.frustumCulled = false;
    }
  });

  // Map bones for the main model
  soldierModel.traverse((child) => {
    if (child.isBone) {
      const xrName = MIXAMO_TO_XR[child.name];
      if (xrName) {
        bonesByXRJoint[xrName] = child;
      }
    }
  });

  console.log('Mapped bones:', Object.keys(bonesByXRJoint).length);

  // Force world matrices up to date so we can sample rest-pose data
  soldierModel.updateMatrixWorld(true);

  // Capture T-pose rest data for each mapped bone
  for (const xrJoint of BONE_ORDER_XR) {
    const bone = bonesByXRJoint[xrJoint];
    if (!bone || !bone.parent) continue;
    boneRestLocal[xrJoint] = bone.quaternion.clone();
    parentBoneRestWorld[xrJoint] = bone.parent.getWorldQuaternion(new THREE.Quaternion());
  }

  // Sample natural heights from bone world positions
  const _tmpPos = new THREE.Vector3();
  if (bonesByXRJoint['head']) {
    bonesByXRJoint['head'].getWorldPosition(_tmpPos);
    soldierNaturalHeadY = _tmpPos.y;
  }
  if (bonesByXRJoint['hips']) {
    bonesByXRJoint['hips'].getWorldPosition(_tmpPos);
    soldierNaturalHipsY = _tmpPos.y;
  }
  let leftToeY = 0, rightToeY = 0;
  if (bonesByXRJoint['left-foot-ball']) {
    bonesByXRJoint['left-foot-ball'].getWorldPosition(_tmpPos);
    leftToeY = _tmpPos.y;
  }
  if (bonesByXRJoint['right-foot-ball']) {
    bonesByXRJoint['right-foot-ball'].getWorldPosition(_tmpPos);
    rightToeY = _tmpPos.y;
  }
  soldierNaturalToesY = Math.min(leftToeY, rightToeY);

  console.log(`Natural heights — head: ${soldierNaturalHeadY.toFixed(3)}, hips: ${soldierNaturalHipsY.toFixed(3)}, toes: ${soldierNaturalToesY.toFixed(3)}`);

  // --- Mirror soldier (cloned, flipped across mirror plane) ---
  // Clone BEFORE any frame renders so scale is still (1,1,1), making rest capture safe.
  mirrorModel = soldierModel.clone();
  mirrorModel.visible = false;
  scene.add(mirrorModel);

  mirrorModel.traverse((child) => {
    if (child.isBone) {
      const xrName = MIXAMO_TO_XR[child.name];
      if (xrName) {
        mirrorBonesByXRJoint[xrName] = child;
      }
    }
    if (child.isSkinnedMesh) {
      child.frustumCulled = false;
    }
  });

  // Force world matrices for mirror model too, then capture rest data
  mirrorModel.updateMatrixWorld(true);

  for (const xrJoint of BONE_ORDER_XR) {
    const bone = mirrorBonesByXRJoint[xrJoint];
    if (!bone || !bone.parent) continue;
    mirrorBoneRestLocal[xrJoint] = bone.quaternion.clone();
    mirrorParentBoneRestWorld[xrJoint] = bone.parent.getWorldQuaternion(new THREE.Quaternion());
  }

}, (progress) => {
  const pct = progress.total > 0 ? Math.round(progress.loaded / progress.total * 100) : '...';
  document.getElementById('loading').textContent = `Loading soldier... ${pct}%`;
}, (err) => {
  console.error('Failed to load soldier:', err);
  document.getElementById('loading').textContent = 'Failed to load model';
});

// --- Body tracking state ---
// Cached quaternion temporaries (minimise GC)
const _parentInvQ      = new THREE.Quaternion();
const _parentRestQ     = new THREE.Quaternion();
const _boneRestQ       = new THREE.Quaternion();
const _xrRestQ         = new THREE.Quaternion();
const _xrCurQ          = new THREE.Quaternion();
const _tmpPos          = new THREE.Vector3();

// Capture the user's T-pose from live XR body data and store per-joint quaternions.
// Also computes a height scale and applies it to both soldier models.
function captureTPose(body, frame, refSpace) {
  let headY = null;

  for (const xrJoint of BONE_ORDER_XR) {
    const jointSpace = body.get(xrJoint);
    if (!jointSpace) continue;
    const pose = frame.getPose(jointSpace, refSpace);
    if (!pose) continue;
    const q = pose.transform.orientation;
    calibRest[xrJoint] = new THREE.Quaternion(q.x, q.y, q.z, q.w);

    if (xrJoint === 'head') {
      headY = pose.transform.position.y;
    }
  }

  // Compute and apply height scale
  if (headY !== null && soldierModel) {
    const modelHeight = soldierNaturalHeadY - soldierNaturalToesY;
    if (modelHeight > 0.001) {
      const yScale = headY / modelHeight;
      soldierModel.scale.set(yScale, yScale, yScale);
      if (mirrorModel) mirrorModel.scale.set(yScale, yScale, yScale);
      console.log(`T-pose calibrated. Head Y: ${headY.toFixed(3)}, scale: ${yScale.toFixed(3)}`);
    }
  }

  isCalibrated = true;
}

// Drive skeleton bones in strict parent-first order.
// Formula (derived from VRM retargeting work):
//   bone.quaternion = parentWorldCur⁻¹ × parentWorldRest × boneRestLocal × xrRest⁻¹ × xrCur
// Falls back to naive formula when not yet calibrated.
function driveSkeleton(bonesMap, restLocal, parentRestWorld, body, frame, refSpace) {
  for (const xrJoint of BONE_ORDER_XR) {
    const bone = bonesMap[xrJoint];
    if (!bone || !bone.parent) continue;

    const jointSpace = body.get(xrJoint);
    if (!jointSpace) continue;
    const pose = frame.getPose(jointSpace, refSpace);
    if (!pose) continue;

    const q = pose.transform.orientation;
    _xrCurQ.set(q.x, q.y, q.z, q.w);

    if (isCalibrated && calibRest[xrJoint] && restLocal[xrJoint] && parentRestWorld[xrJoint]) {
      // Correct retargeting formula:
      // bone.quaternion = parentWorldCur⁻¹ × parentWorldRest × boneRestLocal × xrRest⁻¹ × xrCur

      // parentWorldCur — current world quat of parent (already up-to-date, top-down order)
      bone.parent.getWorldQuaternion(_parentInvQ);
      _parentInvQ.invert(); // now _parentInvQ = parentWorldCur⁻¹

      _parentRestQ.copy(parentRestWorld[xrJoint]);   // parentWorldRest
      _boneRestQ.copy(restLocal[xrJoint]);            // boneRestLocal

      _xrRestQ.copy(calibRest[xrJoint]);
      _xrRestQ.invert(); // xrRest⁻¹

      // Compose: parentWorldCur⁻¹ × parentWorldRest × boneRestLocal × xrRest⁻¹ × xrCur
      bone.quaternion
        .copy(_parentInvQ)
        .multiply(_parentRestQ)
        .multiply(_boneRestQ)
        .multiply(_xrRestQ)
        .multiply(_xrCurQ);
    } else {
      // Naive fallback before calibration: parentWorldCur⁻¹ × xrCur
      bone.parent.getWorldQuaternion(_parentInvQ);
      _parentInvQ.invert();
      bone.quaternion.copy(_parentInvQ).multiply(_xrCurQ);
    }

    // Propagate to this bone's world matrix so children can read it.
    bone.updateWorldMatrix(false, false);
  }
}

function updateSoldierFromBody(frame, refSpace) {
  const body = frame.body;
  if (!body || !soldierModel || Object.keys(bonesByXRJoint).length === 0) {
    if (soldierModel) soldierModel.visible = false;
    if (mirrorModel) mirrorModel.visible = false;
    return false;
  }

  soldierModel.visible = true;

  // Position model so hips are at the tracked hips height
  const hipsSpace = body.get('hips');
  if (hipsSpace) {
    const hipsPose = frame.getPose(hipsSpace, refSpace);
    if (hipsPose) {
      const hp = hipsPose.transform.position;
      soldierModel.position.set(
        hp.x,
        hp.y - soldierNaturalHipsY * soldierModel.scale.y,
        hp.z
      );
    }
  }

  soldierModel.updateWorldMatrix(false, false);

  driveSkeleton(bonesByXRJoint, boneRestLocal, parentBoneRestWorld, body, frame, refSpace);

  // Dynamic grounding: shift model so lowest toe touches y=0
  soldierModel.updateMatrixWorld(true);
  let leftToeWorldY = 0, rightToeWorldY = 0;
  if (bonesByXRJoint['left-foot-ball']) {
    bonesByXRJoint['left-foot-ball'].getWorldPosition(_tmpPos);
    leftToeWorldY = _tmpPos.y;
  }
  if (bonesByXRJoint['right-foot-ball']) {
    bonesByXRJoint['right-foot-ball'].getWorldPosition(_tmpPos);
    rightToeWorldY = _tmpPos.y;
  }
  soldierModel.position.y -= Math.min(leftToeWorldY, rightToeWorldY);

  // --- Mirror model ---
  if (mirrorModel) {
    mirrorModel.visible = true;
    mirrorModel.position.set(
      soldierModel.position.x,
      soldierModel.position.y,
      2 * MIRROR_Z - soldierModel.position.z
    );
    // Mirror scale: preserve XY scale, flip Z
    mirrorModel.scale.set(soldierModel.scale.x, soldierModel.scale.y, -soldierModel.scale.z);
    mirrorModel.updateWorldMatrix(false, false);

    driveSkeleton(mirrorBonesByXRJoint, mirrorBoneRestLocal, mirrorParentBoneRestWorld, body, frame, refSpace);

    // Dynamic grounding for mirror model
    mirrorModel.updateMatrixWorld(true);
    let mirrorLeftToeY = 0, mirrorRightToeY = 0;
    if (mirrorBonesByXRJoint['left-foot-ball']) {
      mirrorBonesByXRJoint['left-foot-ball'].getWorldPosition(_tmpPos);
      mirrorLeftToeY = _tmpPos.y;
    }
    if (mirrorBonesByXRJoint['right-foot-ball']) {
      mirrorBonesByXRJoint['right-foot-ball'].getWorldPosition(_tmpPos);
      mirrorRightToeY = _tmpPos.y;
    }
    mirrorModel.position.y -= Math.min(mirrorLeftToeY, mirrorRightToeY);
  }

  return true;
}

// --- HUD ---
const hudCanvas = document.createElement('canvas');
hudCanvas.width = 400;
hudCanvas.height = 120; // extra height for calibration line
const hudCtx = hudCanvas.getContext('2d');
const hudTexture = new THREE.CanvasTexture(hudCanvas);

const hudMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(0.3, 0.09),
  new THREE.MeshBasicMaterial({ map: hudTexture, transparent: true, opacity: 0.85 })
);
hudMesh.position.set(0, 1.8, -1.0);
scene.add(hudMesh);

let trackedJointCount = 0;
let mappedBoneCount = 0;

function drawHUD() {
  const ctx = hudCtx;
  ctx.clearRect(0, 0, 400, 120);
  ctx.fillStyle = 'rgba(10,10,20,0.7)';
  ctx.beginPath();
  ctx.roundRect(0, 0, 400, 120, 10);
  ctx.fill();

  ctx.fillStyle = trackedJointCount > 0 ? '#44ff88' : '#ff4444';
  ctx.font = 'bold 20px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(trackedJointCount > 0 ? 'Body Tracking Active' : 'No Body Tracking', 200, 28);

  ctx.fillStyle = '#888';
  ctx.font = '14px monospace';
  ctx.fillText(`Joints: ${trackedJointCount}  |  Bones mapped: ${mappedBoneCount}`, 200, 52);

  ctx.fillStyle = '#666';
  ctx.font = '11px sans-serif';
  ctx.fillText('chrome://flags → WebXR Experiments', 200, 73);

  // Calibration status line
  const now = performance.now();
  if (calibCountdownEnd > 0 && now < calibCountdownEnd) {
    const secsLeft = Math.ceil((calibCountdownEnd - now) / 1000);
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 13px monospace';
    ctx.fillText(`Arms OUT — calibrating in ${secsLeft}s`, 200, 100);
  } else if (isCalibrated) {
    ctx.fillStyle = '#44ff88';
    ctx.font = '13px monospace';
    ctx.fillText('T-pose calibrated \u2713  (R-stick to redo)', 200, 100);
  } else {
    ctx.fillStyle = '#aaaaff';
    ctx.font = '13px monospace';
    ctx.fillText('Spread arms \u2192 press R THUMBSTICK', 200, 100);
  }

  hudTexture.needsUpdate = true;
}
drawHUD();

// --- WebXR ---
const enterBtn = document.getElementById('enterVR');

if (navigator.xr) {
  navigator.xr.isSessionSupported('immersive-vr').then(supported => {
    if (supported) {
      enterBtn.disabled = false;
      enterBtn.textContent = 'Enter VR';
    } else {
      enterBtn.textContent = 'VR Not Supported';
    }
  });
} else {
  enterBtn.textContent = 'WebXR Not Available';
}

let xrSession = null;
let refSpace = null;

enterBtn.addEventListener('click', async () => {
  if (xrSession) return;
  try {
    const session = await navigator.xr.requestSession('immersive-vr', {
      optionalFeatures: ['body-tracking', 'local-floor', 'bounded-floor', 'hand-tracking']
    });
    xrSession = session;
    const gl = renderer.getContext();
    const glLayer = new XRWebGLLayer(session, gl, {
      framebufferScaleFactor: XRWebGLLayer.getNativeFramebufferScaleFactor(session),
      antialias: true,
    });
    session.updateRenderState({ baseLayer: glLayer });
    renderer.xr.setSession(session);
    session.addEventListener('end', () => {
      xrSession = null;
      isCalibrated = false;
      calibCountdownEnd = 0;
      thumbstickWasPressed = false;
    });
    enterBtn.textContent = 'In VR';
  } catch (e) {
    console.error('Failed to start XR session:', e);
  }
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Render loop ---
renderer.setAnimationLoop((timestamp, frame) => {
  if (frame && renderer.xr.isPresenting) {
    refSpace = renderer.xr.getReferenceSpace();

    // --- Controller input: right thumbstick triggers T-pose calibration ---
    if (xrSession) {
      for (const src of xrSession.inputSources) {
        if (!src.gamepad) continue;
        if (src.handedness === 'right') {
          const pressed = src.gamepad.buttons[3]?.pressed ?? false;
          if (pressed && !thumbstickWasPressed && calibCountdownEnd === 0) {
            calibCountdownEnd = performance.now() + 3000;
            isCalibrated = false;
          }
          thumbstickWasPressed = pressed;
        }
      }
    }

    // Fire calibration when countdown expires
    if (calibCountdownEnd > 0 && performance.now() >= calibCountdownEnd) {
      calibCountdownEnd = 0;
      if (frame.body) captureTPose(frame.body, frame, refSpace);
    }

    updateSoldierFromBody(frame, refSpace);

    // Count tracked joints
    trackedJointCount = 0;
    if (frame.body) {
      for (const [jointName, jointSpace] of frame.body) {
        const pose = frame.getPose(jointSpace, refSpace);
        if (pose) trackedJointCount++;
      }
    }
    mappedBoneCount = Object.keys(bonesByXRJoint).length;

    drawHUD();
  }

  renderer.render(scene, camera);
});
</script>

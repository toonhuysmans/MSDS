<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebXR Full Body Tracking</title>
<style>
  body { margin: 0; background: #111; color: #fff; font-family: sans-serif; overflow: hidden; }
  #enterVR {
    position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
    padding: 16px 32px; font-size: 18px; background: #44aaff; color: #000;
    border: none; border-radius: 8px; cursor: pointer; z-index: 10;
  }
  #enterVR:disabled { opacity: 0.4; cursor: default; }
  #info {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    text-align: center; opacity: 0.7; font-size: 14px; max-width: 500px;
  }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="info">
  WebXR Full Body Tracking — Quest 3<br>
  <small>Requires: Quest Browser → chrome://flags → enable "WebXR Experiments"</small>
</div>
<button id="enterVR" disabled>Enter VR</button>

<script type="module">
import * as THREE from 'three';
import { Reflector } from 'three/addons/objects/Reflector.js';

// ============================================================
// BODY JOINT NAMES (70 core joints, excluding detailed hand fingers for mesh)
// ============================================================
const BODY_JOINTS = [
  'root', 'hips', 'spine-lower', 'spine-middle', 'spine-upper', 'chest', 'neck', 'head',
  'left-shoulder', 'left-scapula', 'left-arm-upper', 'left-arm-lower', 'left-hand-wrist-twist',
  'right-shoulder', 'right-scapula', 'right-arm-upper', 'right-arm-lower', 'right-hand-wrist-twist',
  'left-upper-leg', 'left-lower-leg', 'left-foot-ankle-twist', 'left-foot-ankle',
  'left-foot-subtalar', 'left-foot-transverse', 'left-foot-ball',
  'right-upper-leg', 'right-lower-leg', 'right-foot-ankle-twist', 'right-foot-ankle',
  'right-foot-subtalar', 'right-foot-transverse', 'right-foot-ball',
  // Left hand
  'left-hand-palm', 'left-hand-wrist',
  'left-hand-thumb-metacarpal', 'left-hand-thumb-phalanx-proximal', 'left-hand-thumb-phalanx-distal', 'left-hand-thumb-tip',
  'left-hand-index-metacarpal', 'left-hand-index-phalanx-proximal', 'left-hand-index-phalanx-intermediate', 'left-hand-index-phalanx-distal', 'left-hand-index-tip',
  'left-hand-middle-metacarpal', 'left-hand-middle-phalanx-proximal', 'left-hand-middle-phalanx-intermediate', 'left-hand-middle-phalanx-distal', 'left-hand-middle-tip',
  'left-hand-ring-metacarpal', 'left-hand-ring-phalanx-proximal', 'left-hand-ring-phalanx-intermediate', 'left-hand-ring-phalanx-distal', 'left-hand-ring-tip',
  'left-hand-little-metacarpal', 'left-hand-little-phalanx-proximal', 'left-hand-little-phalanx-intermediate', 'left-hand-little-phalanx-distal', 'left-hand-little-tip',
  // Right hand
  'right-hand-palm', 'right-hand-wrist',
  'right-hand-thumb-metacarpal', 'right-hand-thumb-phalanx-proximal', 'right-hand-thumb-phalanx-distal', 'right-hand-thumb-tip',
  'right-hand-index-metacarpal', 'right-hand-index-phalanx-proximal', 'right-hand-index-phalanx-intermediate', 'right-hand-index-phalanx-distal', 'right-hand-index-tip',
  'right-hand-middle-metacarpal', 'right-hand-middle-phalanx-proximal', 'right-hand-middle-phalanx-intermediate', 'right-hand-middle-phalanx-distal', 'right-hand-middle-tip',
  'right-hand-ring-metacarpal', 'right-hand-ring-phalanx-proximal', 'right-hand-ring-phalanx-intermediate', 'right-hand-ring-phalanx-distal', 'right-hand-ring-tip',
  'right-hand-little-metacarpal', 'right-hand-little-phalanx-proximal', 'right-hand-little-phalanx-intermediate', 'right-hand-little-phalanx-distal', 'right-hand-little-tip'
];

// Bone connections: [parent, child] — defines the skeleton topology
const BONE_CONNECTIONS = [
  // Spine
  ['hips', 'spine-lower'], ['spine-lower', 'spine-middle'], ['spine-middle', 'spine-upper'],
  ['spine-upper', 'chest'], ['chest', 'neck'], ['neck', 'head'],
  // Left arm
  ['chest', 'left-shoulder'], ['left-shoulder', 'left-scapula'],
  ['left-scapula', 'left-arm-upper'], ['left-arm-upper', 'left-arm-lower'],
  ['left-arm-lower', 'left-hand-wrist-twist'], ['left-hand-wrist-twist', 'left-hand-wrist'],
  // Right arm
  ['chest', 'right-shoulder'], ['right-shoulder', 'right-scapula'],
  ['right-scapula', 'right-arm-upper'], ['right-arm-upper', 'right-arm-lower'],
  ['right-arm-lower', 'right-hand-wrist-twist'], ['right-hand-wrist-twist', 'right-hand-wrist'],
  // Left leg
  ['hips', 'left-upper-leg'], ['left-upper-leg', 'left-lower-leg'],
  ['left-lower-leg', 'left-foot-ankle-twist'], ['left-foot-ankle-twist', 'left-foot-ankle'],
  ['left-foot-ankle', 'left-foot-subtalar'], ['left-foot-subtalar', 'left-foot-transverse'],
  ['left-foot-transverse', 'left-foot-ball'],
  // Right leg
  ['hips', 'right-upper-leg'], ['right-upper-leg', 'right-lower-leg'],
  ['right-lower-leg', 'right-foot-ankle-twist'], ['right-foot-ankle-twist', 'right-foot-ankle'],
  ['right-foot-ankle', 'right-foot-subtalar'], ['right-foot-subtalar', 'right-foot-transverse'],
  ['right-foot-transverse', 'right-foot-ball'],
  // Left hand fingers
  ['left-hand-wrist', 'left-hand-thumb-metacarpal'], ['left-hand-thumb-metacarpal', 'left-hand-thumb-phalanx-proximal'],
  ['left-hand-thumb-phalanx-proximal', 'left-hand-thumb-phalanx-distal'], ['left-hand-thumb-phalanx-distal', 'left-hand-thumb-tip'],
  ['left-hand-wrist', 'left-hand-index-metacarpal'], ['left-hand-index-metacarpal', 'left-hand-index-phalanx-proximal'],
  ['left-hand-index-phalanx-proximal', 'left-hand-index-phalanx-intermediate'], ['left-hand-index-phalanx-intermediate', 'left-hand-index-phalanx-distal'],
  ['left-hand-index-phalanx-distal', 'left-hand-index-tip'],
  ['left-hand-wrist', 'left-hand-middle-metacarpal'], ['left-hand-middle-metacarpal', 'left-hand-middle-phalanx-proximal'],
  ['left-hand-middle-phalanx-proximal', 'left-hand-middle-phalanx-intermediate'], ['left-hand-middle-phalanx-intermediate', 'left-hand-middle-phalanx-distal'],
  ['left-hand-middle-phalanx-distal', 'left-hand-middle-tip'],
  ['left-hand-wrist', 'left-hand-ring-metacarpal'], ['left-hand-ring-metacarpal', 'left-hand-ring-phalanx-proximal'],
  ['left-hand-ring-phalanx-proximal', 'left-hand-ring-phalanx-intermediate'], ['left-hand-ring-phalanx-intermediate', 'left-hand-ring-phalanx-distal'],
  ['left-hand-ring-phalanx-distal', 'left-hand-ring-tip'],
  ['left-hand-wrist', 'left-hand-little-metacarpal'], ['left-hand-little-metacarpal', 'left-hand-little-phalanx-proximal'],
  ['left-hand-little-phalanx-proximal', 'left-hand-little-phalanx-intermediate'], ['left-hand-little-phalanx-intermediate', 'left-hand-little-phalanx-distal'],
  ['left-hand-little-phalanx-distal', 'left-hand-little-tip'],
  // Right hand fingers
  ['right-hand-wrist', 'right-hand-thumb-metacarpal'], ['right-hand-thumb-metacarpal', 'right-hand-thumb-phalanx-proximal'],
  ['right-hand-thumb-phalanx-proximal', 'right-hand-thumb-phalanx-distal'], ['right-hand-thumb-phalanx-distal', 'right-hand-thumb-tip'],
  ['right-hand-wrist', 'right-hand-index-metacarpal'], ['right-hand-index-metacarpal', 'right-hand-index-phalanx-proximal'],
  ['right-hand-index-phalanx-proximal', 'right-hand-index-phalanx-intermediate'], ['right-hand-index-phalanx-intermediate', 'right-hand-index-phalanx-distal'],
  ['right-hand-index-phalanx-distal', 'right-hand-index-tip'],
  ['right-hand-wrist', 'right-hand-middle-metacarpal'], ['right-hand-middle-metacarpal', 'right-hand-middle-phalanx-proximal'],
  ['right-hand-middle-phalanx-proximal', 'right-hand-middle-phalanx-intermediate'], ['right-hand-middle-phalanx-intermediate', 'right-hand-middle-phalanx-distal'],
  ['right-hand-middle-phalanx-distal', 'right-hand-middle-tip'],
  ['right-hand-wrist', 'right-hand-ring-metacarpal'], ['right-hand-ring-metacarpal', 'right-hand-ring-phalanx-proximal'],
  ['right-hand-ring-phalanx-proximal', 'right-hand-ring-phalanx-intermediate'], ['right-hand-ring-phalanx-intermediate', 'right-hand-ring-phalanx-distal'],
  ['right-hand-ring-phalanx-distal', 'right-hand-ring-tip'],
  ['right-hand-wrist', 'right-hand-little-metacarpal'], ['right-hand-little-metacarpal', 'right-hand-little-phalanx-proximal'],
  ['right-hand-little-phalanx-proximal', 'right-hand-little-phalanx-intermediate'], ['right-hand-little-phalanx-intermediate', 'right-hand-little-phalanx-distal'],
  ['right-hand-little-phalanx-distal', 'right-hand-little-tip'],
];

// Joint radii for the body mesh — larger for torso, smaller for fingers
const JOINT_RADII = {};
const TORSO = ['root','hips','spine-lower','spine-middle','spine-upper','chest'];
const LIMB_UPPER = ['left-shoulder','right-shoulder','left-scapula','right-scapula',
  'left-arm-upper','right-arm-upper','left-upper-leg','right-upper-leg'];
const LIMB_LOWER = ['left-arm-lower','right-arm-lower','left-lower-leg','right-lower-leg',
  'left-hand-wrist-twist','right-hand-wrist-twist'];
const EXTREMITIES = ['left-foot-ankle-twist','right-foot-ankle-twist','left-foot-ankle','right-foot-ankle',
  'left-foot-subtalar','right-foot-subtalar','left-foot-transverse','right-foot-transverse',
  'left-foot-ball','right-foot-ball'];

for (const j of BODY_JOINTS) {
  if (TORSO.includes(j)) JOINT_RADII[j] = 0.06;
  else if (j === 'neck') JOINT_RADII[j] = 0.04;
  else if (j === 'head') JOINT_RADII[j] = 0.09;
  else if (LIMB_UPPER.includes(j)) JOINT_RADII[j] = 0.04;
  else if (LIMB_LOWER.includes(j)) JOINT_RADII[j] = 0.03;
  else if (EXTREMITIES.includes(j)) JOINT_RADII[j] = 0.025;
  else if (j.includes('hand-palm') || j.includes('hand-wrist')) JOINT_RADII[j] = 0.02;
  else JOINT_RADII[j] = 0.008; // finger joints
}

// Bone thickness
function boneRadius(parentName, childName) {
  if (TORSO.includes(parentName) && TORSO.includes(childName)) return 0.04;
  if (parentName.includes('upper-leg') || childName.includes('upper-leg')) return 0.035;
  if (parentName.includes('lower-leg') || childName.includes('lower-leg')) return 0.03;
  if (parentName.includes('arm-upper') || childName.includes('arm-upper')) return 0.025;
  if (parentName.includes('arm-lower') || childName.includes('arm-lower')) return 0.02;
  if (parentName.includes('hand') || childName.includes('hand')) return 0.005;
  return 0.015;
}

// --- Scene ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 100);
camera.position.set(0, 1.6, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(1, 3, 2);
scene.add(dirLight);

scene.add(new THREE.GridHelper(20, 40, 0x333333, 0x222222));

// --- Mirror (Reflector — renders scene from reflected camera) ---
const MIRROR_Z = -2.0;

const mirror = new Reflector(new THREE.PlaneGeometry(2, 2.5), {
  clipBias: 0.003,
  textureWidth: 2048,
  textureHeight: 2048,
  color: new THREE.Color(0x889999),
});
mirror.position.set(0, 1.25, MIRROR_Z);
scene.add(mirror);

const frameMat = new THREE.MeshStandardMaterial({ color: 0x333344, roughness: 0.5, metalness: 0.3 });
[[0, 2.52, 2.08, 0.04], [0, -0.02, 2.08, 0.04], [-1.04, 1.25, 0.04, 2.58], [1.04, 1.25, 0.04, 2.58]]
  .forEach(([x, y, w, h]) => {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, 0.04), frameMat);
    m.position.set(x, y, MIRROR_Z);
    scene.add(m);
  });

// --- Body mesh: joints as spheres, bones as cylinders ---
const bodyMaterial = new THREE.MeshStandardMaterial({
  color: 0x44aaff,
  roughness: 0.5,
  metalness: 0.1,
  transparent: true,
  opacity: 0.85
});

const jointMeshes = {};
const sphereGeoCache = {};

function getSphereGeo(radius) {
  const key = radius.toFixed(3);
  if (!sphereGeoCache[key]) {
    sphereGeoCache[key] = new THREE.SphereGeometry(radius, 10, 8);
  }
  return sphereGeoCache[key];
}

for (const jointName of BODY_JOINTS) {
  const r = JOINT_RADII[jointName] || 0.015;
  const mesh = new THREE.Mesh(getSphereGeo(r), bodyMaterial);
  mesh.visible = false;
  scene.add(mesh);
  jointMeshes[jointName] = mesh;
}

// Bone cylinders
const boneMeshes = [];
const cylGeo = new THREE.CylinderGeometry(1, 1, 1, 6); // unit cylinder, scaled per bone
cylGeo.translate(0, 0.5, 0); // pivot at bottom

for (const [parentName, childName] of BONE_CONNECTIONS) {
  const r = boneRadius(parentName, childName);
  const mesh = new THREE.Mesh(cylGeo, bodyMaterial);
  mesh.visible = false;
  mesh.userData.parent = parentName;
  mesh.userData.child = childName;
  mesh.userData.radius = r;
  scene.add(mesh);
  boneMeshes.push(mesh);
}

// --- Body skin mesh (smooth surface over skeleton) ---
// We build capsule-like shapes by scaling cylinders with rounded ends
// This gives a more "body" look than raw skeleton
const skinMaterial = new THREE.MeshStandardMaterial({
  color: 0xddaa88,
  roughness: 0.6,
  metalness: 0.0,
  transparent: true,
  opacity: 0.7,
  side: THREE.DoubleSide
});

const skinSegments = [];
const capsuleGeo = new THREE.CapsuleGeometry(1, 1, 4, 8);

// Create skin segments for major body parts
const SKIN_BONES = [
  // Torso
  ['hips', 'spine-lower', 0.12], ['spine-lower', 'spine-middle', 0.11],
  ['spine-middle', 'spine-upper', 0.10], ['spine-upper', 'chest', 0.10],
  ['chest', 'neck', 0.06],
  // Arms
  ['left-scapula', 'left-arm-upper', 0.04], ['left-arm-upper', 'left-arm-lower', 0.035],
  ['left-arm-lower', 'left-hand-wrist-twist', 0.03],
  ['right-scapula', 'right-arm-upper', 0.04], ['right-arm-upper', 'right-arm-lower', 0.035],
  ['right-arm-lower', 'right-hand-wrist-twist', 0.03],
  // Legs
  ['left-upper-leg', 'left-lower-leg', 0.055], ['left-lower-leg', 'left-foot-ankle', 0.04],
  ['right-upper-leg', 'right-lower-leg', 0.055], ['right-lower-leg', 'right-foot-ankle', 0.04],
];

for (const [from, to, radius] of SKIN_BONES) {
  const mesh = new THREE.Mesh(capsuleGeo, skinMaterial);
  mesh.visible = false;
  mesh.userData.from = from;
  mesh.userData.to = to;
  mesh.userData.radius = radius;
  scene.add(mesh);
  skinSegments.push(mesh);
}

// Head sphere
const headMesh = new THREE.Mesh(new THREE.SphereGeometry(1, 12, 10), skinMaterial);
headMesh.visible = false;
scene.add(headMesh);

// --- Joint position cache ---
const jointPositions = {};
const _dir = new THREE.Vector3();
const _up = new THREE.Vector3(0, 1, 0);

function updateBodyFromFrame(frame, refSpace) {
  const body = frame.body;
  if (!body) {
    // Hide everything if no body tracking
    for (const m of Object.values(jointMeshes)) m.visible = false;
    for (const m of boneMeshes) m.visible = false;
    for (const m of skinSegments) m.visible = false;
    headMesh.visible = false;
    return false;
  }

  // Update joint positions
  for (const [jointName, jointSpace] of body) {
    const pose = frame.getPose(jointSpace, refSpace);
    const mesh = jointMeshes[jointName];
    if (pose) {
      const p = pose.transform.position;
      const q = pose.transform.orientation;
      if (mesh) {
        mesh.position.set(p.x, p.y, p.z);
        mesh.quaternion.set(q.x, q.y, q.z, q.w);
        mesh.visible = true;
      }
      jointPositions[jointName] = jointPositions[jointName] || new THREE.Vector3();
      jointPositions[jointName].set(p.x, p.y, p.z);
    } else {
      if (mesh) mesh.visible = false;
    }
  }

  // Update bone cylinders
  for (const bone of boneMeshes) {
    const pPos = jointPositions[bone.userData.parent];
    const cPos = jointPositions[bone.userData.child];
    if (pPos && cPos && jointMeshes[bone.userData.parent]?.visible && jointMeshes[bone.userData.child]?.visible) {
      bone.visible = true;
      bone.position.copy(pPos);
      _dir.copy(cPos).sub(pPos);
      const len = _dir.length();
      if (len < 0.001) { bone.visible = false; continue; }
      bone.scale.set(bone.userData.radius, len, bone.userData.radius);
      bone.quaternion.setFromUnitVectors(_up, _dir.normalize());
    } else {
      bone.visible = false;
    }
  }

  // Update skin segments (capsules)
  for (const seg of skinSegments) {
    const fromPos = jointPositions[seg.userData.from];
    const toPos = jointPositions[seg.userData.to];
    if (fromPos && toPos) {
      seg.visible = true;
      _dir.copy(toPos).sub(fromPos);
      const len = _dir.length();
      if (len < 0.001) { seg.visible = false; continue; }
      const mid = new THREE.Vector3().addVectors(fromPos, toPos).multiplyScalar(0.5);
      seg.position.copy(mid);
      seg.scale.set(seg.userData.radius, len / 2, seg.userData.radius);
      seg.quaternion.setFromUnitVectors(_up, _dir.normalize());
    } else {
      seg.visible = false;
    }
  }

  // Head
  const headPos = jointPositions['head'];
  if (headPos) {
    headMesh.visible = true;
    headMesh.position.copy(headPos);
    headMesh.position.y += 0.04; // offset up slightly
    headMesh.scale.setScalar(0.10);
  } else {
    headMesh.visible = false;
  }

  return true;
}

// --- HUD ---
const hudCanvas = document.createElement('canvas');
hudCanvas.width = 400;
hudCanvas.height = 100;
const hudCtx = hudCanvas.getContext('2d');
const hudTexture = new THREE.CanvasTexture(hudCanvas);

const hudMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(0.3, 0.075),
  new THREE.MeshBasicMaterial({ map: hudTexture, transparent: true, opacity: 0.85 })
);
hudMesh.position.set(0, 1.8, -1.0);
scene.add(hudMesh);

let trackedJointCount = 0;

function drawHUD() {
  const ctx = hudCtx;
  ctx.clearRect(0, 0, 400, 100);
  ctx.fillStyle = 'rgba(10,10,20,0.7)';
  ctx.beginPath();
  ctx.roundRect(0, 0, 400, 100, 10);
  ctx.fill();

  ctx.fillStyle = trackedJointCount > 0 ? '#44ff88' : '#ff4444';
  ctx.font = 'bold 22px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(trackedJointCount > 0 ? 'Body Tracking Active' : 'No Body Tracking', 200, 35);

  ctx.fillStyle = '#888';
  ctx.font = '16px monospace';
  ctx.fillText(`Joints: ${trackedJointCount}`, 200, 60);

  ctx.fillStyle = '#666';
  ctx.font = '12px sans-serif';
  ctx.fillText('Enable: chrome://flags → WebXR Experiments', 200, 85);

  hudTexture.needsUpdate = true;
}
drawHUD();

// --- WebXR ---
const enterBtn = document.getElementById('enterVR');

if (navigator.xr) {
  navigator.xr.isSessionSupported('immersive-vr').then(supported => {
    if (supported) {
      enterBtn.disabled = false;
      enterBtn.textContent = 'Enter VR';
    } else {
      enterBtn.textContent = 'VR Not Supported';
    }
  });
} else {
  enterBtn.textContent = 'WebXR Not Available';
}

let xrSession = null;
let refSpace = null;

enterBtn.addEventListener('click', async () => {
  if (xrSession) return;
  try {
    const session = await navigator.xr.requestSession('immersive-vr', {
      optionalFeatures: ['body-tracking', 'local-floor', 'bounded-floor', 'hand-tracking']
    });
    xrSession = session;
    renderer.xr.setSession(session);
    session.addEventListener('end', () => { xrSession = null; });
    enterBtn.textContent = 'In VR';
  } catch (e) {
    console.error('Failed to start XR session:', e);
  }
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Render loop ---
renderer.setAnimationLoop((timestamp, frame) => {
  if (frame && renderer.xr.isPresenting) {
    refSpace = renderer.xr.getReferenceSpace();

    updateBodyFromFrame(frame, refSpace);

    // Count tracked joints
    trackedJointCount = 0;
    if (frame.body) {
      for (const [jointName, jointSpace] of frame.body) {
        const pose = frame.getPose(jointSpace, refSpace);
        if (pose) trackedJointCount++;
      }
    }

    drawHUD();
  }

  renderer.render(scene, camera);
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebXR VRM Body Tracking</title>
<style>
  body { margin: 0; background: #111; color: #fff; font-family: sans-serif; overflow: hidden; }
  #enterVR {
    position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
    padding: 16px 32px; font-size: 18px; background: #44aaff; color: #000;
    border: none; border-radius: 8px; cursor: pointer; z-index: 10;
  }
  #enterVR:disabled { opacity: 0.4; cursor: default; }
  #info {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    text-align: center; opacity: 0.7; font-size: 14px; max-width: 500px;
  }
  #loading {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    font-size: 20px; opacity: 0.6;
  }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/",
    "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2/lib/three-vrm.module.js"
  }
}
</script>
</head>
<body>
<div id="info">
  WebXR VRM Body Tracking — Quest 3<br>
  <small>Requires: Quest Browser → chrome://flags → enable "WebXR Experiments"</small>
</div>
<div id="loading">Loading VRM model...</div>
<button id="enterVR" disabled>Enter VR</button>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { VRMLoaderPlugin, VRMHumanBoneName } from '@pixiv/three-vrm';

// ============================================================
// CONFIG
// ============================================================
// Replace with your own VRM from VRoid Hub for a custom avatar
const VRM_URL = 'https://raw.githubusercontent.com/pixiv/three-vrm/dev/packages/three-vrm/examples/models/VRM1_Constraint_Twist_Sample.vrm';
const MIRROR_Z = -2.0;  // Z position of the mirror wall

// ============================================================
// XR body joint → VRM humanoid bone name
// ============================================================
const XR_TO_VRM = {
  'head':             VRMHumanBoneName.Head,
  'left-shoulder':    VRMHumanBoneName.LeftShoulder,
  'left-arm-upper':   VRMHumanBoneName.LeftUpperArm,
  'left-arm-lower':   VRMHumanBoneName.LeftLowerArm,
  'left-hand-wrist':  VRMHumanBoneName.LeftHand,
  'right-shoulder':   VRMHumanBoneName.RightShoulder,
  'right-arm-upper':  VRMHumanBoneName.RightUpperArm,
  'right-arm-lower':  VRMHumanBoneName.RightLowerArm,
  'right-hand-wrist': VRMHumanBoneName.RightHand,
};

const BONE_DRIVE_ORDER = [
  'head',
  'left-shoulder',  'left-arm-upper',  'left-arm-lower',  'left-hand-wrist',
  'right-shoulder', 'right-arm-upper', 'right-arm-lower', 'right-hand-wrist',
];

// XR body joint hierarchy — needed to compute relative rotations
const XR_PARENT = {
  'spine-lower':      'hips',
  'spine-middle':     'spine-lower',
  'spine-upper':      'spine-middle',
  'neck':             'spine-upper',
  'head':             'neck',
  'left-shoulder':    'spine-upper',
  'left-arm-upper':   'left-shoulder',
  'left-arm-lower':   'left-arm-upper',
  'left-hand-wrist':  'left-arm-lower',
  'right-shoulder':   'spine-upper',
  'right-arm-upper':  'right-shoulder',
  'right-arm-lower':  'right-arm-upper',
  'right-hand-wrist': 'right-arm-lower',
  'left-upper-leg':   'hips',
  'left-lower-leg':   'left-upper-leg',
  'left-foot-ankle':  'left-lower-leg',
  'left-foot-ball':   'left-foot-ankle',
  'right-upper-leg':  'hips',
  'right-lower-leg':  'right-upper-leg',
  'right-foot-ankle': 'right-lower-leg',
  'right-foot-ball':  'right-foot-ankle',
};

// All joints whose world orientation we need to capture at T-pose
// (driven joints + their XR parents)
const CAL_JOINTS = [
  'neck', 'head',
  'spine-upper',
  'left-shoulder',  'left-arm-upper',  'left-arm-lower',  'left-hand-wrist',
  'right-shoulder', 'right-arm-upper', 'right-arm-lower', 'right-hand-wrist',
];

// ============================================================
// Scene
// ============================================================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 100);
camera.position.set(0, 1.6, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(2, 4, 3);
scene.add(dirLight);

scene.add(new THREE.GridHelper(20, 40, 0x333333, 0x222222));

// ============================================================
// Mirror wall
// ============================================================
const mirrorSurface = new THREE.Mesh(
  new THREE.PlaneGeometry(2, 2.5),
  new THREE.MeshStandardMaterial({
    color: 0x667788, roughness: 0.05, metalness: 0.9,
    transparent: true, opacity: 0.12, side: THREE.DoubleSide
  })
);
mirrorSurface.position.set(0, 1.25, MIRROR_Z);
scene.add(mirrorSurface);

const frameMat = new THREE.MeshStandardMaterial({ color: 0x333344, roughness: 0.5, metalness: 0.3 });
[[0, 2.52, 2.08, 0.04], [0, -0.02, 2.08, 0.04], [-1.04, 1.25, 0.04, 2.58], [1.04, 1.25, 0.04, 2.58]]
  .forEach(([x, y, w, h]) => {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, 0.04), frameMat);
    m.position.set(x, y, MIRROR_Z);
    scene.add(m);
  });

// ============================================================
// Load VRM
// ============================================================
let vrm = null;
let vrmMirror = null;

const loader = new GLTFLoader();
loader.register(parser => new VRMLoaderPlugin(parser));

loader.load(
  VRM_URL,
  (gltf) => {
    document.getElementById('loading').style.display = 'none';

    vrm = gltf.userData.vrm;

    // VRM1 characters face +Z by default.
    // WebXR initial forward = -Z, mirror is at z = MIRROR_Z.
    // Rotate 180° so character faces the mirror (-Z) and the user
    // sees their avatar's front face reflected back.
    vrm.scene.rotation.y = Math.PI;

    vrm.scene.visible = false;
    scene.add(vrm.scene);

    // --- Mirror clone (second load) ---
    loader.load(VRM_URL, (gltf2) => {
      vrmMirror = gltf2.userData.vrm;
      vrmMirror.scene.rotation.y = Math.PI;
      vrmMirror.scene.visible = false;
      vrmMirror.scene.scale.set(1, 1, -1); // Z-flip for mirror reflection
      scene.add(vrmMirror.scene);
    }, undefined, (err) => console.warn('Mirror VRM load failed:', err));

    console.log('VRM loaded:', vrm);
  },
  (progress) => {
    const pct = progress.total > 0 ? Math.round(progress.loaded / progress.total * 100) : '...';
    document.getElementById('loading').textContent = `Loading VRM... ${pct}%`;
  },
  (err) => {
    console.error('VRM load error:', err);
    document.getElementById('loading').textContent = 'Failed to load VRM model';
  }
);

// ============================================================
// T-pose calibration
// ============================================================
// Problem: at T-pose, Meta body tracking joint orientations are NOT identity.
// The relative rotation xrParent⁻¹ × xrJoint carries a constant T-pose offset
// that would be misapplied to VRM normalized bones (which expect identity at T-pose).
//
// Solution: capture joint orientations once at T-pose (calibration), then compute:
//   boneQuat = (restParent⁻¹ × restChild)⁻¹ × (xrParent⁻¹ × xrJoint)
//
// This cancels out the T-pose offset, leaving only the delta rotation — exactly
// what VRM normalized bones need.

const calibrationRest = {};  // joint name → THREE.Quaternion
let isCalibrated = false;
let needsCalibration = false;  // flag set by button/key, consumed in render loop

function captureTPose(body, frame, refSpace) {
  let captured = 0;
  for (const jointName of CAL_JOINTS) {
    const q = getXRQuat(body, frame, refSpace, jointName);
    if (q) {
      calibrationRest[jointName] = q;
      captured++;
    }
  }
  if (captured > 0) {
    isCalibrated = true;
    console.log(`T-pose calibrated: ${captured}/${CAL_JOINTS.length} joints`);
    console.log('Rest poses:', Object.fromEntries(
      Object.entries(calibrationRest).map(([k, v]) => [k, `(${v.x.toFixed(2)},${v.y.toFixed(2)},${v.z.toFixed(2)},${v.w.toFixed(2)})`])
    ));
  }
}

// Keyboard shortcut for desktop testing (also works via adb devtools)
document.addEventListener('keydown', (e) => {
  if (e.key === 'c' || e.key === 'C') needsCalibration = true;
});

// ============================================================
// Body tracking → VRM humanoid
// ============================================================

function getXRQuat(body, frame, refSpace, jointName) {
  const space = body.get(jointName);
  if (!space) return null;
  const pose = frame.getPose(space, refSpace);
  if (!pose) return null;
  const q = pose.transform.orientation;
  return new THREE.Quaternion(q.x, q.y, q.z, q.w);
}

// Debug state: per-joint status shown in HUD
const debugJointStatus = {};

function driveVRM(vrmInstance, body, frame, refSpace, isMain) {
  for (const xrJoint of BONE_DRIVE_ORDER) {
    const boneName = XR_TO_VRM[xrJoint];
    if (!boneName) continue;

    const boneNode = vrmInstance.humanoid.getNormalizedBoneNode(boneName);
    if (!boneNode) continue;

    const jointQuat = getXRQuat(body, frame, refSpace, xrJoint);
    if (!jointQuat) {
      if (isMain) debugJointStatus[xrJoint] = '✗ null';
      continue;
    }

    const parentXRJoint = XR_PARENT[xrJoint];
    if (parentXRJoint) {
      const parentQuat = getXRQuat(body, frame, refSpace, parentXRJoint);
      if (parentQuat) {
        // Raw relative rotation in XR world space
        const rel = parentQuat.clone().invert().multiply(jointQuat);

        if (isCalibrated &&
            calibrationRest[parentXRJoint] && calibrationRest[xrJoint]) {
          // T-pose relative rotation (constant offset at rest)
          const restRel = calibrationRest[parentXRJoint].clone().invert()
                            .multiply(calibrationRest[xrJoint]);
          // Remove T-pose offset → pure delta from T-pose
          const corrected = restRel.invert().multiply(rel);
          if (isMain) debugJointStatus[xrJoint] = `✓ cal w=${corrected.w.toFixed(2)}`;
          boneNode.quaternion.copy(corrected);
        } else {
          if (isMain) debugJointStatus[xrJoint] = `~ raw w=${rel.w.toFixed(2)}`;
          boneNode.quaternion.copy(rel);
        }
        continue;
      } else {
        if (isMain) debugJointStatus[xrJoint] = `✗ parent(${parentXRJoint}) null`;
      }
    }

    // Root or parent unavailable — use world quat directly
    if (isMain) debugJointStatus[xrJoint] = `✓ world w=${jointQuat.w.toFixed(2)}`;
    boneNode.quaternion.copy(jointQuat);
  }
}

function updateVRMFromBody(frame, refSpace) {
  const body = frame.body;
  if (!body || !vrm) return false;

  // Consume calibration request
  if (needsCalibration) {
    needsCalibration = false;
    captureTPose(body, frame, refSpace);
  }

  vrm.scene.visible = true;

  // Position model: align model root so hips appear at tracked hips
  const hipsSpace = body.get('hips');
  if (hipsSpace) {
    const hipsPose = frame.getPose(hipsSpace, refSpace);
    if (hipsPose) {
      const hp = hipsPose.transform.position;
      // ~0.9 m = approximate hips height in VRM model space
      vrm.scene.position.set(hp.x, hp.y - 0.9, hp.z);
    }
  }

  driveVRM(vrm, body, frame, refSpace, true);

  // Mirror
  if (vrmMirror) {
    vrmMirror.scene.visible = true;
    vrmMirror.scene.position.set(
      vrm.scene.position.x,
      vrm.scene.position.y,
      2 * MIRROR_Z - vrm.scene.position.z
    );
    driveVRM(vrmMirror, body, frame, refSpace, false);
  }

  return true;
}

// ============================================================
// HUD
// ============================================================
const hudCanvas = document.createElement('canvas');
hudCanvas.width = 512; hudCanvas.height = 340;
const hudCtx = hudCanvas.getContext('2d');
const hudTexture = new THREE.CanvasTexture(hudCanvas);
const hudMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(0.45, 0.30),
  new THREE.MeshBasicMaterial({ map: hudTexture, transparent: true, opacity: 0.9 })
);
hudMesh.position.set(0, 1.8, -1.0);
scene.add(hudMesh);

let jointCount = 0;

function drawHUD() {
  const ctx = hudCtx;
  ctx.clearRect(0, 0, 512, 340);
  ctx.fillStyle = 'rgba(10,10,20,0.85)';
  ctx.beginPath(); ctx.roundRect(0, 0, 512, 340, 10); ctx.fill();

  // Body tracking status
  ctx.fillStyle = jointCount > 0 ? '#44ff88' : '#ff4444';
  ctx.font = 'bold 18px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(jointCount > 0 ? 'Body Tracking Active' : 'No Body Tracking', 256, 24);

  // Calibration status
  ctx.font = '13px monospace';
  if (calibCountdown > 0) {
    ctx.fillStyle = '#ffdd00';
    ctx.font = 'bold 16px monospace';
    ctx.fillText(`Spread arms OUT horizontal — calibrating in ${Math.ceil(calibCountdown)}…`, 256, 46);
  } else if (isCalibrated) {
    ctx.fillStyle = '#44ff88';
    ctx.fillText('T-pose calibrated ✓  (thumbstick to redo)', 256, 46);
  } else {
    ctx.fillStyle = '#ffaa44';
    ctx.fillText('Spread arms out → press RIGHT THUMBSTICK (or C)', 256, 46);
  }

  // Per-joint status
  ctx.textAlign = 'left';
  let y = 70;
  for (const joint of BONE_DRIVE_ORDER) {
    const status = debugJointStatus[joint] || '…';
    const ok = status.startsWith('✓');
    const raw = status.startsWith('~');
    ctx.fillStyle = ok ? '#44ff88' : raw ? '#ffaa44' : '#ff6644';
    ctx.fillText(`${joint}: ${status}`, 12, y);
    y += 24;
  }

  hudTexture.needsUpdate = true;
}
drawHUD();

// ============================================================
// WebXR session
// ============================================================
const enterBtn = document.getElementById('enterVR');

if (navigator.xr) {
  navigator.xr.isSessionSupported('immersive-vr').then(supported => {
    if (supported) {
      enterBtn.disabled = false;
    } else {
      enterBtn.textContent = 'VR Not Supported';
    }
  });
} else {
  enterBtn.textContent = 'WebXR Not Available';
}

let xrSession = null;
let refSpace = null;

enterBtn.addEventListener('click', async () => {
  if (xrSession) return;
  try {
    const session = await navigator.xr.requestSession('immersive-vr', {
      optionalFeatures: ['body-tracking', 'local-floor', 'bounded-floor', 'hand-tracking']
    });
    xrSession = session;
    const gl = renderer.getContext();
    const glLayer = new XRWebGLLayer(session, gl, {
      framebufferScaleFactor: XRWebGLLayer.getNativeFramebufferScaleFactor(session),
      antialias: true,
    });
    session.updateRenderState({ baseLayer: glLayer });
    renderer.xr.setSession(session);
    session.addEventListener('end', () => { xrSession = null; });
    enterBtn.textContent = 'In VR';
  } catch (e) {
    console.error('Failed to start VR session:', e);
    enterBtn.textContent = 'Error — see console';
  }
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============================================================
// Controller calibration trigger tracking (3-second countdown)
// ============================================================
let thumbstickWasPressed = false;
let calibCountdown = 0;    // seconds remaining; 0 = idle
let calibCountdownStart = 0;
const CALIB_DELAY = 3;     // seconds to get into T-pose

function checkCalibrationTrigger() {
  if (!xrSession) return;
  for (const source of xrSession.inputSources) {
    if (source.handedness === 'right' && source.gamepad) {
      const pressed = source.gamepad.buttons[3]?.pressed ?? false;
      if (pressed && !thumbstickWasPressed && calibCountdown === 0) {
        calibCountdownStart = performance.now();
        calibCountdown = CALIB_DELAY;
        isCalibrated = false;  // reset so HUD shows countdown clearly
      }
      thumbstickWasPressed = pressed;
      break;
    }
  }

  // Tick countdown
  if (calibCountdown > 0) {
    const elapsed = (performance.now() - calibCountdownStart) / 1000;
    const remaining = Math.max(0, CALIB_DELAY - elapsed);
    calibCountdown = remaining;
    if (remaining === 0) {
      needsCalibration = true;
    }
  }
}

// ============================================================
// Render loop
// ============================================================
let prevTime = 0;

renderer.setAnimationLoop((timestamp, frame) => {
  const now = performance.now();
  const dt = prevTime > 0 ? Math.min((now - prevTime) / 1000, 0.1) : 0.016;
  prevTime = now;

  if (frame && renderer.xr.isPresenting) {
    refSpace = renderer.xr.getReferenceSpace();

    checkCalibrationTrigger();
    updateVRMFromBody(frame, refSpace);

    // Count tracked joints for HUD
    jointCount = 0;
    if (frame.body) {
      for (const [, jointSpace] of frame.body) {
        if (frame.getPose(jointSpace, refSpace)) jointCount++;
      }
    }
    drawHUD();
  }

  // VRM update: applies normalized pose to actual skeleton, spring bones, etc.
  if (vrm) vrm.update(dt);
  if (vrmMirror) vrmMirror.update(dt);

  renderer.render(scene, camera);
});
</script>
</body>
</html>

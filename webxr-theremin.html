<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebXR Theremin</title>
<style>
  body { margin: 0; background: #060610; color: #fff; font-family: sans-serif; overflow: hidden; }
  #enterVR {
    position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
    padding: 16px 32px; font-size: 18px; background: #9944ff; color: #fff;
    border: none; border-radius: 8px; cursor: pointer; z-index: 10;
  }
  #enterVR:disabled { opacity: 0.4; cursor: default; }
  #info {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    text-align: center; opacity: 0.7; font-size: 14px;
  }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="info">
  WebXR Theremin — Quest 3<br>
  <small>Right hand height = pitch &nbsp;|&nbsp; Left hand height = volume</small>
</div>
<button id="enterVR" disabled>Enter VR</button>

<script type="module">
import * as THREE from 'three';
import { Reflector } from 'three/addons/objects/Reflector.js';

// ─── Audio ────────────────────────────────────────────────────────────────────
let audioCtx = null;
let oscillator = null;
let gainNode = null;
let filterNode = null; // lowpass — cutoff driven by left hand openness
let lfoGain = null;    // vibrato depth — driven by right hand openness

function initAudio() {
  if (audioCtx) return;
  audioCtx = new AudioContext();

  // Convolver reverb via impulse response
  const convolver = audioCtx.createConvolver();
  const irLen = audioCtx.sampleRate * 2.5;
  const irBuf = audioCtx.createBuffer(2, irLen, audioCtx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = irBuf.getChannelData(ch);
    for (let i = 0; i < irLen; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / irLen, 2.5);
  }
  convolver.buffer = irBuf;

  // Vibrato: main LFO (~5.5 Hz) with drifting rate, depth driven by right hand openness
  const lfo = audioCtx.createOscillator();
  lfoGain = audioCtx.createGain(); // exposed globally
  lfo.frequency.value = 5.5;
  lfoGain.gain.value = 0;
  lfo.connect(lfoGain);
  lfo.start();

  const lfoRateWobble = audioCtx.createOscillator(); // modulates lfo.frequency
  const lfoRateWobbleGain = audioCtx.createGain();
  lfoRateWobble.frequency.value = 0.25;
  lfoRateWobbleGain.gain.value = 0.6; // ±0.6 Hz drift on vibrato rate
  lfoRateWobble.connect(lfoRateWobbleGain);
  lfoRateWobbleGain.connect(lfo.frequency);
  lfoRateWobble.start();

  // Sawtooth oscillators — richer harmonic content than sine
  oscillator = audioCtx.createOscillator();
  oscillator.type = 'sawtooth';
  oscillator.frequency.value = 220;
  lfoGain.connect(oscillator.frequency);

  const osc2 = audioCtx.createOscillator();
  osc2.type = 'sawtooth';
  osc2.frequency.value = 220;
  osc2.detune.value = 7;
  lfoGain.connect(osc2.frequency);

  gainNode = audioCtx.createGain();
  gainNode.gain.value = 0;

  // Lowpass filter — cutoff rises with volume: quiet = dark/muted, loud = bright
  // This replicates the natural harmonic characteristic of a real theremin
  filterNode = audioCtx.createBiquadFilter();
  filterNode.type = 'lowpass';
  filterNode.frequency.value = 300; // starts dark/silent
  filterNode.Q.value = 1.2;         // slight resonance warmth at cutoff

  const dryGain = audioCtx.createGain();
  dryGain.gain.value = 0.7;
  const reverbGain = audioCtx.createGain();
  reverbGain.gain.value = 0.35;

  oscillator.connect(gainNode);
  osc2.connect(gainNode);
  gainNode.connect(filterNode);
  filterNode.connect(dryGain);
  filterNode.connect(convolver);
  convolver.connect(reverbGain);
  dryGain.connect(audioCtx.destination);
  reverbGain.connect(audioCtx.destination);

  oscillator.start();
  osc2.start();

}

// Pitch: right hand X → frequency  (real theremin: hand moves toward/away from vertical rod)
// Antenna is at x=+PITCH_X_ANTENNA. Closer (higher X) = higher pitch.
// ~20cm horizontal sweep covers the full range.
const PITCH_X_ANTENNA = 0.36; // x position of pitch rod
const PITCH_X_FAR  = 0.08;   // right hand far left  → lowest pitch
const PITCH_X_NEAR = 0.34;   // right hand near rod  → highest pitch
const FREQ_MIN = 110;
const FREQ_MAX = 880;

// Volume: left hand Y → gain  (real theremin: hand height above volume loop)
// ~20cm vertical sweep covers full range.
const VOL_Y_MIN = 0.82;  // hand low  → silent
const VOL_Y_MAX = 0.88;  // hand high → full volume (~6cm, finger-level movement)

function xToFreq(x) {
  const t = Math.max(0, Math.min(1, (x - PITCH_X_FAR) / (PITCH_X_NEAR - PITCH_X_FAR)));
  return FREQ_MIN * Math.pow(FREQ_MAX / FREQ_MIN, t);
}

function yToGain(y) {
  return Math.max(0, Math.min(1, (y - VOL_Y_MIN) / (VOL_Y_MAX - VOL_Y_MIN)));
}

// ─── Scale quantization ───────────────────────────────────────────────────────
// Intervals in semitones from A (440 Hz = 0). Cycle FREE → MAJOR → MINOR → PENTA.
const SCALE_DEFS = {
  FREE:  null,
  MAJOR: [0, 2, 4, 5, 7, 9, 11],   // A major
  MINOR: [0, 2, 3, 5, 7, 8, 10],   // A natural minor
  PENTA: [0, 2, 4, 7, 9],           // A major pentatonic
};
const SCALE_NAMES = Object.keys(SCALE_DEFS); // ['FREE','MAJOR','MINOR','PENTA']
let scaleIndex = 0;

function quantizeFreq(freq) {
  const intervals = SCALE_DEFS[SCALE_NAMES[scaleIndex]];
  if (!intervals) return freq;
  const semitones = 12 * Math.log2(freq / 440);
  const octave = Math.round(semitones / 12);
  let best = semitones, bestDist = Infinity;
  for (let oct = octave - 1; oct <= octave + 1; oct++) {
    for (const iv of intervals) {
      const candidate = oct * 12 + iv;
      const dist = Math.abs(candidate - semitones);
      if (dist < bestDist) { bestDist = dist; best = candidate; }
    }
  }
  return 440 * Math.pow(2, best / 12);
}

// Note name from frequency
function freqToNote(freq) {
  const NOTE_NAMES = ['A','A#','B','C','C#','D','D#','E','F','F#','G','G#'];
  const semitones = Math.round(12 * Math.log2(freq / 440));
  const octave = 4 + Math.floor((semitones + 9) / 12);
  const name = NOTE_NAMES[((semitones % 12) + 12) % 12];
  return `${name}${octave}`;
}

// ─── Scene ────────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x060610);
scene.fog = new THREE.Fog(0x060610, 5, 20);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 50);
camera.position.set(0, 1.6, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);

// Lighting
scene.add(new THREE.AmbientLight(0x221133, 2));
const rimLight = new THREE.DirectionalLight(0x9944ff, 1.5);
rimLight.position.set(-2, 3, -1);
scene.add(rimLight);
const fillLight = new THREE.DirectionalLight(0x44aaff, 0.8);
fillLight.position.set(2, 2, 1);
scene.add(fillLight);

// Floor grid
const gridHelper = new THREE.GridHelper(20, 40, 0x220033, 0x110022);
scene.add(gridHelper);

// Subtle floor glow plane
const floorGeo = new THREE.PlaneGeometry(8, 8);
const floorMat = new THREE.MeshStandardMaterial({
  color: 0x110022, roughness: 1, metalness: 0,
  transparent: true, opacity: 0.6
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = 0.001;
scene.add(floor);

// Mirror
const MIRROR_Z = -2.0;
const mirror = new Reflector(new THREE.PlaneGeometry(2.5, 2.5), {
  clipBias: 0.003,
  textureWidth: 1024,
  textureHeight: 1024,
  color: new THREE.Color(0x443366),
});
mirror.position.set(0, 1.25, MIRROR_Z);
scene.add(mirror);

// Mirror frame
const frameMat = new THREE.MeshStandardMaterial({ color: 0x221133, roughness: 0.4, metalness: 0.6 });
[[0, 2.52, 2.58, 0.04], [0, -0.02, 2.58, 0.04], [-1.29, 1.25, 0.04, 2.58], [1.29, 1.25, 0.04, 2.58]]
  .forEach(([x, y, w, h]) => {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, 0.04), frameMat);
    m.position.set(x, y, MIRROR_Z);
    scene.add(m);
  });

// ─── Theremin stand — compact, right in front ─────────────────────────────
const STAND_Z = -0.55; // close enough to reach without moving feet
const STAND_Y = 0.50;  // tabletop height (lowered)

// Box body
const boxMat = new THREE.MeshStandardMaterial({ color: 0x1a0a2e, roughness: 0.4, metalness: 0.7 });
const boxMesh = new THREE.Mesh(new THREE.BoxGeometry(0.75, 0.10, 0.28), boxMat);
boxMesh.position.set(0, STAND_Y, STAND_Z);
scene.add(boxMesh);

// Decorative panel stripe
const stripeMat = new THREE.MeshStandardMaterial({ color: 0x9944ff, emissive: 0x6622cc, emissiveIntensity: 0.8, roughness: 0.2, metalness: 0.9 });
const stripe = new THREE.Mesh(new THREE.BoxGeometry(0.73, 0.012, 0.02), stripeMat);
stripe.position.set(0, STAND_Y + 0.04, STAND_Z - 0.13);
scene.add(stripe);

// ─── Scale toggle switch (front-center of stand) ─────────────────────────
const switchCanvas = document.createElement('canvas');
switchCanvas.width = 128; switchCanvas.height = 48;
const switchCtx = switchCanvas.getContext('2d');
const switchTex = new THREE.CanvasTexture(switchCanvas);
const switchButtonMat = new THREE.MeshStandardMaterial({
  roughness: 0.3, metalness: 0.5, map: switchTex,
  emissive: new THREE.Color(0x110022), emissiveIntensity: 1
});
const switchMesh = new THREE.Mesh(new THREE.BoxGeometry(0.11, 0.025, 0.045), switchButtonMat);
switchMesh.position.set(0, STAND_Y + 0.062, STAND_Z - 0.105);
scene.add(switchMesh);

function updateSwitchVisual() {
  const ctx = switchCtx;
  ctx.clearRect(0, 0, 128, 48);
  const name = SCALE_NAMES[scaleIndex];
  const isFree = name === 'FREE';
  ctx.fillStyle = isFree ? '#1a0a2e' : '#0a1e14';
  ctx.fillRect(0, 0, 128, 48);
  ctx.fillStyle = isFree ? '#cc66ff' : '#44ffaa';
  ctx.font = 'bold 20px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(name, 64, 24);
  switchTex.needsUpdate = true;
  switchButtonMat.emissive.set(isFree ? 0x110022 : 0x003311);
}
updateSwitchVisual();

// ─── Pitch antenna — vertical rod on the RIGHT ────────────────────────────
// Like a real theremin: player's right hand moves LEFT/RIGHT toward/away from the rod.
// Rod is tall so it's easy to see; the horizontal distance to it is what matters.
const ANTENNA_TOTAL_H = 1.1; // visual height of the full rod above tabletop
const antennaMat = new THREE.MeshStandardMaterial({ color: 0xff4488, emissive: 0xff2266, emissiveIntensity: 1.5 });
const antennaR = new THREE.Mesh(new THREE.CylinderGeometry(0.007, 0.007, ANTENNA_TOTAL_H, 8), antennaMat);
antennaR.position.set(PITCH_X_ANTENNA, STAND_Y + 0.05 + ANTENNA_TOTAL_H / 2, STAND_Z);
scene.add(antennaR);

// Horizontal proximity indicators — flat rings at hand height showing the play zone
const tickMat = new THREE.MeshStandardMaterial({ color: 0xff88bb, emissive: 0xff4488, emissiveIntensity: 0.8, transparent: true, opacity: 0.6 });
// One ring at the midpoint of the pitch range, in the XZ plane, to show where to hover
const zoneRingGeo = new THREE.TorusGeometry((PITCH_X_ANTENNA - PITCH_X_FAR) / 2, 0.005, 6, 32);
const zoneRing = new THREE.Mesh(zoneRingGeo, tickMat);
zoneRing.rotation.x = Math.PI / 2;
zoneRing.position.set(PITCH_X_FAR + (PITCH_X_ANTENNA - PITCH_X_FAR) / 2, 0.92, STAND_Z);
scene.add(zoneRing);

// ─── Volume loop — horizontal torus on the LEFT ───────────────────────────
// Like a real theremin: left hand height above the loop controls volume.
// Loop sits at VOL_Y_MIN; hand rises above it to increase volume.
const loopMat = new THREE.MeshStandardMaterial({ color: 0x44ffaa, emissive: 0x22ff88, emissiveIntensity: 1.5 });
const antennaL = new THREE.Mesh(new THREE.TorusGeometry(0.15, 0.007, 8, 32), loopMat);
antennaL.position.set(-0.28, VOL_Y_MIN, STAND_Z);
antennaL.rotation.x = Math.PI / 2;
scene.add(antennaL);

// Vertical range guide: thin glowing line above the loop showing the play range
const volGuideMat = new THREE.MeshStandardMaterial({ color: 0x44ffaa, emissive: 0x22ff88, emissiveIntensity: 0.5, transparent: true, opacity: 0.45 });
const volGuide = new THREE.Mesh(new THREE.CylinderGeometry(0.003, 0.003, VOL_Y_MAX - VOL_Y_MIN, 6), volGuideMat);
volGuide.position.set(-0.28, (VOL_Y_MIN + VOL_Y_MAX) / 2, STAND_Z);
scene.add(volGuide);

// Stub from tabletop to loop
const stubL = new THREE.Mesh(new THREE.CylinderGeometry(0.007, 0.009, VOL_Y_MIN - STAND_Y - 0.05, 8), loopMat);
stubL.position.set(-0.28, STAND_Y + 0.05 + (VOL_Y_MIN - STAND_Y - 0.05) / 2, STAND_Z);
scene.add(stubL);

// ─── Instruction panel ────────────────────────────────────────────────────
const instrCanvas = document.createElement('canvas');
instrCanvas.width = 640; instrCanvas.height = 560;
const instrCtx = instrCanvas.getContext('2d');
const instrTex = new THREE.CanvasTexture(instrCanvas);

function drawInstructions() {
  const ctx = instrCtx;
  const W = 640, H = 560;
  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = 'rgba(6,6,22,0.93)';
  ctx.beginPath(); ctx.roundRect(4, 4, W - 8, H - 8, 16); ctx.fill();
  ctx.strokeStyle = '#441166';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.roundRect(4, 4, W - 8, H - 8, 16); ctx.stroke();

  // Title
  ctx.fillStyle = '#cc88ff';
  ctx.font = 'bold 26px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('HOW TO PLAY', W / 2, 44);

  ctx.strokeStyle = '#331155';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(32, 58); ctx.lineTo(W - 32, 58); ctx.stroke();

  // ── Two-column: Right / Left ────────────────────────────
  const colR = 160, colL = 480;

  // Right hand
  ctx.fillStyle = '#ff4488';
  ctx.font = 'bold 19px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('RIGHT HAND', colR, 90);
  ctx.fillText('PITCH', colR, 112);
  ctx.font = '42px sans-serif';
  ctx.fillText('↔', colR, 172);
  ctx.fillStyle = '#cc6688';
  ctx.font = '14px monospace';
  ctx.fillText('NEAR ROD → A5  880Hz', colR, 210);
  ctx.fillText('────────────────', colR, 226);
  ctx.fillText('FAR LEFT → A2  110Hz', colR, 242);
  ctx.fillStyle = '#886677';
  ctx.font = '13px monospace';
  ctx.fillText('index fingertip · ~20cm', colR, 264);

  // Column divider
  ctx.strokeStyle = '#331155';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(W / 2, 66); ctx.lineTo(W / 2, 380); ctx.stroke();

  // Left hand
  ctx.fillStyle = '#44ffaa';
  ctx.font = 'bold 19px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('LEFT HAND', colL, 90);
  ctx.fillText('VOLUME', colL, 112);
  ctx.font = '42px sans-serif';
  ctx.fillText('↕', colL, 172);
  ctx.fillStyle = '#22aa66';
  ctx.font = '14px monospace';
  ctx.fillText('RAISE → LOUDER', colL, 210);
  ctx.fillText('────────────────', colL, 226);
  ctx.fillText('LOWER → QUIETER', colL, 242);
  ctx.fillStyle = '#336655';
  ctx.font = '13px monospace';
  ctx.fillText('index fingertip · ~6cm', colL, 264);

  // ── Sound behaviour section ─────────────────────────────
  ctx.strokeStyle = '#331155';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(32, 292); ctx.lineTo(W - 32, 292); ctx.stroke();

  ctx.fillStyle = '#9966bb';
  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('SOUND BEHAVIOUR', W / 2, 316);

  const notes = [
    ['Timbre',    'sawtooth — richer harmonics than sine'],
    ['Brightness','LEFT openness: fist=dark, open hand=bright'],
    ['Vibrato',   'RIGHT openness: fist=none, open hand=full'],
    ['Portamento','pitch glides smoothly between notes'],
  ];
  ctx.textAlign = 'left';
  notes.forEach(([label, desc], i) => {
    const y = 344 + i * 36;
    ctx.fillStyle = '#cc88ff';
    ctx.font = 'bold 13px monospace';
    ctx.fillText(label, 36, y);
    ctx.fillStyle = '#776688';
    ctx.font = '13px monospace';
    ctx.fillText(desc, 150, y);
  });

  // Footer
  ctx.strokeStyle = '#331155';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(32, H - 36); ctx.lineTo(W - 32, H - 36); ctx.stroke();
  ctx.fillStyle = '#554466';
  ctx.font = '13px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('Pitch rod RIGHT  ·  Volume loop LEFT  ·  stand still', W / 2, H - 14);

  instrTex.needsUpdate = true;
}
drawInstructions();

const instrMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(0.72, 0.63),
  new THREE.MeshBasicMaterial({ map: instrTex, transparent: true, depthWrite: false })
);
instrMesh.position.set(-0.72, 1.35, STAND_Z - 0.05);
// Angle toward the player standing at z≈0 (rotate around Y so normal faces player)
instrMesh.rotation.y = Math.atan2(0.72, Math.abs(STAND_Z - 0.05));
scene.add(instrMesh);

// ─── Hand joint visuals ───────────────────────────────────────────────────────
const HAND_JOINTS = [
  'wrist',
  'thumb-metacarpal', 'thumb-phalanx-proximal', 'thumb-phalanx-distal', 'thumb-tip',
  'index-finger-metacarpal', 'index-finger-phalanx-proximal', 'index-finger-phalanx-intermediate', 'index-finger-phalanx-distal', 'index-finger-tip',
  'middle-finger-metacarpal', 'middle-finger-phalanx-proximal', 'middle-finger-phalanx-intermediate', 'middle-finger-phalanx-distal', 'middle-finger-tip',
  'ring-finger-metacarpal', 'ring-finger-phalanx-proximal', 'ring-finger-phalanx-intermediate', 'ring-finger-phalanx-distal', 'ring-finger-tip',
  'pinky-finger-metacarpal', 'pinky-finger-phalanx-proximal', 'pinky-finger-phalanx-intermediate', 'pinky-finger-phalanx-distal', 'pinky-finger-tip',
];

const JOINT_RADIUS = {
  'wrist': 0.018,
  'thumb-metacarpal': 0.012, 'thumb-phalanx-proximal': 0.010, 'thumb-phalanx-distal': 0.009, 'thumb-tip': 0.008,
};
function getJointRadius(name) { return JOINT_RADIUS[name] || (name.endsWith('-tip') ? 0.007 : 0.006); }

// Right hand: pitch color (warm: low=deep red, high=violet)
const rightHandMat = new THREE.MeshStandardMaterial({
  color: 0xff4488, emissive: 0xff2266, emissiveIntensity: 0.8,
  roughness: 0.3, metalness: 0.1
});
// Left hand: volume color (cool: low=dark teal, high=bright cyan)
const leftHandMat = new THREE.MeshStandardMaterial({
  color: 0x44ffaa, emissive: 0x22ff88, emissiveIntensity: 0.8,
  roughness: 0.3, metalness: 0.1
});

function makeHandMeshes(mat) {
  const meshes = {};
  for (const name of HAND_JOINTS) {
    const r = getJointRadius(name);
    const m = new THREE.Mesh(new THREE.SphereGeometry(r, 8, 6), mat);
    m.visible = false;
    scene.add(m);
    meshes[name] = m;
  }
  return meshes;
}

const rightMeshes = makeHandMeshes(rightHandMat);
const leftMeshes  = makeHandMeshes(leftHandMat);

// Wrist glow orb (larger, emissive)
function makeWristOrb(color, emissive) {
  const mat = new THREE.MeshStandardMaterial({
    color, emissive, emissiveIntensity: 2,
    transparent: true, opacity: 0.6,
    roughness: 0, metalness: 0
  });
  const m = new THREE.Mesh(new THREE.SphereGeometry(0.04, 16, 12), mat);
  m.visible = false;
  scene.add(m);
  return m;
}
const rightOrb = makeWristOrb(0xff4488, 0xff2266);
const leftOrb  = makeWristOrb(0x44ffaa, 0x22ff88);

// ─── HUD ─────────────────────────────────────────────────────────────────────
const hudCanvas = document.createElement('canvas');
hudCanvas.width = 512; hudCanvas.height = 200;
const hudCtx = hudCanvas.getContext('2d');
const hudTex = new THREE.CanvasTexture(hudCanvas);
const hudMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(0.5, 0.195),
  new THREE.MeshBasicMaterial({ map: hudTex, transparent: true, depthWrite: false })
);
hudMesh.position.set(1.1, 1.35, MIRROR_Z + 0.01); // right side of mirror
scene.add(hudMesh);

let currentFreq = 220;
let currentGain = 0;
let rightTracked = false;
let leftTracked  = false;

function drawHUD() {
  const ctx = hudCtx;
  ctx.clearRect(0, 0, 512, 200);

  // Background
  ctx.fillStyle = 'rgba(6,6,16,0.85)';
  ctx.beginPath(); ctx.roundRect(4, 4, 504, 192, 12); ctx.fill();

  // Border glow
  ctx.strokeStyle = currentGain > 0.01 ? '#9944ff' : '#331155';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.roundRect(4, 4, 504, 192, 12); ctx.stroke();

  if (!rightTracked && !leftTracked) {
    ctx.fillStyle = '#554466';
    ctx.font = 'bold 22px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('Show hands to play', 256, 108);
    hudTex.needsUpdate = true;
    return;
  }

  // Note name
  const note = freqToNote(currentFreq);
  ctx.fillStyle = '#ff4488';
  ctx.font = 'bold 64px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(note, 24, 80);

  // Frequency
  ctx.fillStyle = '#cc88aa';
  ctx.font = '22px monospace';
  ctx.fillText(`${Math.round(currentFreq)} Hz`, 24, 112);

  // Volume bar
  ctx.fillStyle = '#112222';
  ctx.beginPath(); ctx.roundRect(24, 130, 460, 18, 4); ctx.fill();
  const barW = Math.round(460 * currentGain);
  if (barW > 0) {
    const grad = ctx.createLinearGradient(24, 0, 484, 0);
    grad.addColorStop(0, '#115533');
    grad.addColorStop(1, '#44ffaa');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.roundRect(24, 130, barW, 18, 4); ctx.fill();
  }
  ctx.fillStyle = '#44ffaa';
  ctx.font = '14px monospace';
  ctx.textAlign = 'right';
  ctx.fillText(`VOL ${Math.round(currentGain * 100)}%`, 488, 145);

  // Pitch bar
  const pitchT = Math.max(0, Math.min(1, (currentFreq - FREQ_MIN) / (FREQ_MAX - FREQ_MIN)));
  ctx.fillStyle = '#221122';
  ctx.beginPath(); ctx.roundRect(24, 158, 460, 18, 4); ctx.fill();
  const pitchW = Math.round(460 * pitchT);
  if (pitchW > 0) {
    const pgrad = ctx.createLinearGradient(24, 0, 484, 0);
    pgrad.addColorStop(0, '#550022');
    pgrad.addColorStop(1, '#ff4488');
    ctx.fillStyle = pgrad;
    ctx.beginPath(); ctx.roundRect(24, 158, pitchW, 18, 4); ctx.fill();
  }
  ctx.fillStyle = '#ff4488';
  ctx.font = '14px monospace';
  ctx.textAlign = 'right';
  ctx.fillText(`PITCH ${Math.round(pitchT * 100)}%`, 488, 173);

  hudTex.needsUpdate = true;
}
drawHUD();

// ─── Hand update ─────────────────────────────────────────────────────────────
// Returns { x, y, openness } from index fingertip + hand spread, or null if not tracked.
// openness: 0 = closed fist, 1 = fully open hand (avg fingertip-to-wrist distance).
const OPENNESS_TIPS = ['index-finger-tip','middle-finger-tip','ring-finger-tip','pinky-finger-tip'];
function updateHand(src, frame, refSpace) {
  const isRight = src.handedness === 'right';
  const meshes  = isRight ? rightMeshes : leftMeshes;
  const orb     = isRight ? rightOrb    : leftOrb;

  let tipPos = null;
  let wristP = null;
  const tipPositions = {};

  for (const jointName of HAND_JOINTS) {
    const jointSpace = src.hand.get(jointName);
    if (!jointSpace) { if (meshes[jointName]) meshes[jointName].visible = false; continue; }
    const pose = frame.getPose(jointSpace, refSpace);
    const m = meshes[jointName];
    if (!m) continue;
    if (pose) {
      const p = pose.transform.position;
      m.position.set(p.x, p.y, p.z);
      m.visible = true;
      if (jointName === 'wrist') {
        wristP = p;
      } else if (jointName === 'index-finger-tip') {
        tipPos = { x: p.x, y: p.y, z: p.z };
        orb.position.set(p.x, p.y, p.z);
        orb.visible = true;
      }
      if (OPENNESS_TIPS.includes(jointName)) tipPositions[jointName] = p;
    } else {
      m.visible = false;
      if (jointName === 'index-finger-tip') orb.visible = false;
    }
  }

  if (!tipPos) return null;

  // Openness: average fingertip distance from wrist, normalised (0.06m=fist, 0.17m=open)
  let openness = 0;
  if (wristP) {
    let sum = 0, cnt = 0;
    for (const t of OPENNESS_TIPS) {
      if (tipPositions[t]) {
        sum += Math.hypot(tipPositions[t].x - wristP.x, tipPositions[t].y - wristP.y, tipPositions[t].z - wristP.z);
        cnt++;
      }
    }
    if (cnt > 0) openness = Math.max(0, Math.min(1, (sum / cnt - 0.06) / 0.11));
  }

  return { ...tipPos, openness };
}

// ─── WebXR setup ─────────────────────────────────────────────────────────────
const enterBtn = document.getElementById('enterVR');

if (navigator.xr) {
  navigator.xr.isSessionSupported('immersive-vr').then(supported => {
    enterBtn.disabled = !supported;
    enterBtn.textContent = supported ? 'Enter VR' : 'VR Not Supported';
  });
} else {
  enterBtn.textContent = 'WebXR Not Available';
}

let xrSession = null;
let refSpace = null;

enterBtn.addEventListener('click', async () => {
  if (xrSession) return;
  initAudio();
  if (audioCtx.state === 'suspended') await audioCtx.resume();
  try {
    const session = await navigator.xr.requestSession('immersive-vr', {
      optionalFeatures: ['local-floor', 'bounded-floor', 'hand-tracking']
    });
    xrSession = session;
    renderer.xr.setSession(session);
    session.addEventListener('end', () => { xrSession = null; });
    enterBtn.textContent = 'In VR';
  } catch (e) {
    console.error('Failed to start XR session:', e);
  }
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Render loop ─────────────────────────────────────────────────────────────
const _tmpColor = new THREE.Color();
let time = 0;
let switchCooldown = 0; // seconds until switch can be triggered again

renderer.setAnimationLoop((timestamp, frame) => {
  time += 0.016;

  // Animate antennas
  antennaR.material.emissiveIntensity = 1.2 + 0.5 * Math.sin(time * 3.1);
  antennaL.material.emissiveIntensity = 1.2 + 0.5 * Math.sin(time * 2.7 + 1);

  if (frame && renderer.xr.isPresenting) {
    refSpace = renderer.xr.getReferenceSpace();

    let rightWrist = null;
    let leftWrist  = null;
    rightTracked = false;
    leftTracked  = false;

    for (const src of xrSession.inputSources) {
      if (!src.hand) continue;
      if (src.handedness === 'right') {
        rightWrist = updateHand(src, frame, refSpace);
        rightTracked = rightWrist !== null;
      } else if (src.handedness === 'left') {
        leftWrist = updateHand(src, frame, refSpace);
        leftTracked = leftWrist !== null;
      }
    }

    // ── Scale switch touch detection ──
    switchCooldown -= 0.016;
    if (switchCooldown <= 0) {
      const sw = switchMesh.position;
      for (const hand of [rightWrist, leftWrist]) {
        if (!hand) continue;
        const dist = Math.hypot(hand.x - sw.x, hand.y - sw.y, hand.z - sw.z);
        if (dist < 0.045) {
          scaleIndex = (scaleIndex + 1) % SCALE_NAMES.length;
          updateSwitchVisual();
          switchCooldown = 0.6;
          break;
        }
      }
    }

    // Hide orbs if not tracked
    if (!rightTracked) { for (const m of Object.values(rightMeshes)) m.visible = false; rightOrb.visible = false; }
    if (!leftTracked)  { for (const m of Object.values(leftMeshes))  m.visible = false; leftOrb.visible = false; }

    // ── Audio control ──
    if (audioCtx && oscillator) {
      const now = audioCtx.currentTime;
      const smoothTime = 0.05; // 50ms — slight portamento glide

      if (rightTracked && rightWrist !== null) {
        // Pitch: right index fingertip X → frequency, optionally quantized
        const targetFreq = quantizeFreq(xToFreq(rightWrist.x));
        currentFreq = targetFreq;
        oscillator.frequency.setTargetAtTime(targetFreq, now, smoothTime);

        // Vibrato depth: right hand openness (fist=none, open=full)
        if (lfoGain) lfoGain.gain.setTargetAtTime(rightWrist.openness * 6, now, 0.12);

        // Color right hand by pitch (red=low → violet=high)
        const t = (targetFreq - FREQ_MIN) / (FREQ_MAX - FREQ_MIN);
        _tmpColor.setHSL(0.85 - t * 0.5, 1, 0.55);
        rightHandMat.emissive.copy(_tmpColor);
        rightOrb.material.emissive.copy(_tmpColor);
        rightOrb.material.color.copy(_tmpColor);
      }

      if (leftTracked && leftWrist !== null) {
        // Volume: left index fingertip height
        const targetGain = yToGain(leftWrist.y);
        currentGain = targetGain;
        gainNode.gain.setTargetAtTime(targetGain * 0.6, now, smoothTime);

        // Brightness (filter cutoff): left hand openness (fist=dark, open=bright)
        if (filterNode) filterNode.frequency.setTargetAtTime(300 + leftWrist.openness * 2900, now, 0.08);

        // Color left hand by volume (dark=quiet → bright=loud)
        const t = targetGain;
        _tmpColor.setHSL(0.42, 1, 0.2 + t * 0.35); // teal range
        leftHandMat.emissive.copy(_tmpColor);
        leftOrb.material.emissive.copy(_tmpColor);

        // Pulse orb size with volume
        const pulse = 1 + t * 0.4 * (0.8 + 0.2 * Math.sin(time * 8));
        leftOrb.scale.setScalar(pulse);
      } else {
        // Fade out when left hand lost
        gainNode.gain.setTargetAtTime(0, now, 0.1);
        currentGain = 0;
      }
    }

    drawHUD();
  }

  renderer.render(scene, camera);
});
</script>
</body>
</html>

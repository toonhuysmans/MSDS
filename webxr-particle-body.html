<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebXR Particle Body</title>
<style>
  body { margin: 0; background: #020208; overflow: hidden; }
  #enterVR {
    position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
    padding: 16px 32px; font-size: 18px; background: #44aaff; color: #000;
    border: none; border-radius: 8px; cursor: pointer; z-index: 10;
  }
  #enterVR:disabled { opacity: 0.4; cursor: default; }
  #info {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    text-align: center; color: #334; font-size: 13px; font-family: sans-serif;
  }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/",
    "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2/lib/three-vrm.module.js"
  }
}
</script>
</head>
<body>
<div id="info">Particle Body Mirror — Quest 3 · chrome://flags → WebXR Experiments<br><small>A mirror of your body appears 2 m ahead — particles rain down and bounce off its shape</small></div>
<button id="enterVR" disabled>Enter VR</button>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { VRMLoaderPlugin, VRMHumanBoneName } from '@pixiv/three-vrm';

// ============================================================
// Config — tune N down if frame-rate drops
// ============================================================
const N           = 200_000; // particle count
const GRAVITY     = -1.2;    // m/s² — gentle ash drift
const AIR_DRAG    =  1.8;    // s⁻¹ — linear drag; terminal velocity ≈ GRAVITY/AIR_DRAG ≈ 0.67 m/s
const RESTITUTION = 0.04;    // nearly no bounce — ash deadens on impact
const BODY_STICK  = 0.08;    // tangential velocity retained on body contact
const FLOOR_STICK = 0.15;    // horizontal velocity retained on floor contact
const SPAWN_R     = 2.0;     // rain radius around body centre (m)
const SPAWN_Y     = 4.5;     // rain spawn height (m above floor)
const CULL_R2         = 1.6*1.6; // collision zone (XZ distance² from mirror hips)
const MIRROR_PLANE_Z  = -1.5;    // world-Z of the mirror surface (halfway between user and image)

// ============================================================
// Pre-computed respawn table — avoids Math.random/cos in the hot loop
// ============================================================
const RBUF = 8192;
const RD = new Float32Array(RBUF * 3); // vx, vy, vz — random spherical kick
for (let i = 0; i < RBUF; i++) {
  const theta = Math.random() * 6.28318;
  const phi   = Math.acos(2 * Math.random() - 1); // uniform sphere
  const speed = 0.04 + Math.random() * 0.12; // gentle ash dispersal
  RD[i*3+0] = Math.sin(phi) * Math.cos(theta) * speed;
  RD[i*3+1] = Math.sin(phi) * Math.sin(theta) * speed;
  RD[i*3+2] = Math.cos(phi) * speed;
}
let rdHead = 0;

// ============================================================
// Particle state (flat typed arrays)
// ============================================================
const pos = new Float32Array(N * 3);
const vel = new Float32Array(N * 3);
const col = new Float32Array(N * 3);
const age       = new Float32Array(N); // bounce flash [0..1], decays to 0
const restTimer = new Float32Array(N); // seconds until next launch; >0 = parked invisible

// Per-particle intrinsic properties — randomised once, never change
const propSize = new Float32Array(N); // point size multiplier
const propMass = new Float32Array(N); // affects gravity & drag (heavy falls fast; light floats)
const propGlow = new Float32Array(N); // heat sensitivity multiplier
for (let i = 0; i < N; i++) {
  propSize[i] = 0.4 + Math.random() * Math.random() * 1.2; // skewed 0.4–1.6, mostly fine ash
  propMass[i] = 0.7 + Math.random() * 0.5;                  // 0.7–1.2, ash is uniformly light
  propGlow[i] = 0.6 + Math.random() * 0.7;                  // 0.6–1.3, subtle ember variation
}

let spawnX = 0, spawnY = 4.5, spawnZ = 2 * MIRROR_PLANE_Z; // updated each frame from mirrored head joint

// Stagger initial launches so they trickle out rather than burst all at once
for (let i = 0; i < N; i++) {
  pos[i*3] = spawnX; pos[i*3+1] = spawnY; pos[i*3+2] = spawnZ;
  vel[i*3] = 0; vel[i*3+1] = 0; vel[i*3+2] = 0;
  col[i*3] = 0; col[i*3+1] = 0; col[i*3+2] = 0;
  restTimer[i] = Math.random() * 12.0;
}

// ============================================================
// Scene
// ============================================================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020208);
scene.fog = new THREE.FogExp2(0x020208, 0.12);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 30);
camera.position.set(0, 1.5, 0.5);   // user viewpoint — looking at mirror body ahead
camera.lookAt(0, 1.2, 2 * MIRROR_PLANE_Z);

const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.xr.enabled = true;
renderer.xr.setReferenceSpaceType('local-floor');
document.body.appendChild(renderer.domElement);

// Subtle floor ring — visual ground reference
const floorRing = new THREE.Mesh(
  new THREE.RingGeometry(0.05, 2.2, 80),
  new THREE.MeshBasicMaterial({ color: 0x0a0a22, transparent: true, opacity: 0.6, side: THREE.DoubleSide })
);
floorRing.rotation.x = -Math.PI / 2;
floorRing.position.set(0, 0.001, 2 * MIRROR_PLANE_Z);
scene.add(floorRing);

// ============================================================
// VRM mirror body — driven from body tracking, rendered ghostly
// ============================================================
const VRM_URL = 'https://raw.githubusercontent.com/pixiv/three-vrm/dev/packages/three-vrm/examples/models/VRM1_Constraint_Twist_Sample.vrm';
const _Qy180    = new THREE.Quaternion(0, 1, 0, 0);
const _Qy180inv = new THREE.Quaternion(0, -1, 0, 0);
const _tv = new THREE.Vector3();

// XR body joint → VRM humanoid bone (for pose driving)
const XR_TO_VRM = {
  'hips':             VRMHumanBoneName.Hips,
  'spine-lower':      VRMHumanBoneName.Spine,
  'spine-middle':     VRMHumanBoneName.Chest,
  'spine-upper':      VRMHumanBoneName.UpperChest,
  'neck':             VRMHumanBoneName.Neck,
  'head':             VRMHumanBoneName.Head,
  'left-shoulder':    VRMHumanBoneName.LeftShoulder,
  'left-arm-upper':   VRMHumanBoneName.LeftUpperArm,
  'left-arm-lower':   VRMHumanBoneName.LeftLowerArm,
  'left-hand-wrist':  VRMHumanBoneName.LeftHand,
  'right-shoulder':   VRMHumanBoneName.RightShoulder,
  'right-arm-upper':  VRMHumanBoneName.RightUpperArm,
  'right-arm-lower':  VRMHumanBoneName.RightLowerArm,
  'right-hand-wrist': VRMHumanBoneName.RightHand,
  'left-upper-leg':   VRMHumanBoneName.LeftUpperLeg,
  'left-lower-leg':   VRMHumanBoneName.LeftLowerLeg,
  'left-foot-ankle':  VRMHumanBoneName.LeftFoot,
  'right-upper-leg':  VRMHumanBoneName.RightUpperLeg,
  'right-lower-leg':  VRMHumanBoneName.RightLowerLeg,
  'right-foot-ankle': VRMHumanBoneName.RightFoot,
};

// Parent-first drive order
const BONE_DRIVE_ORDER = [
  'hips',
  'spine-lower', 'spine-middle', 'spine-upper', 'neck', 'head',
  'left-shoulder',   'left-arm-upper',   'left-arm-lower',   'left-hand-wrist',
  'right-shoulder',  'right-arm-upper',  'right-arm-lower',  'right-hand-wrist',
  'left-upper-leg',  'left-lower-leg',   'left-foot-ankle',
  'right-upper-leg', 'right-lower-leg',  'right-foot-ankle',
];

// XR joint parent chain
const XR_PARENT = {
  'spine-lower':     'hips',       'spine-middle':    'spine-lower',
  'spine-upper':     'spine-middle','neck':            'spine-upper',
  'head':            'neck',
  'left-shoulder':   'spine-upper', 'left-arm-upper':  'left-shoulder',
  'left-arm-lower':  'left-arm-upper','left-hand-wrist':'left-arm-lower',
  'right-shoulder':  'spine-upper', 'right-arm-upper': 'right-shoulder',
  'right-arm-lower': 'right-arm-upper','right-hand-wrist':'right-arm-lower',
  'left-upper-leg':  'hips',        'left-lower-leg':  'left-upper-leg',
  'left-foot-ankle': 'left-lower-leg',
  'right-upper-leg': 'hips',        'right-lower-leg': 'right-upper-leg',
  'right-foot-ankle':'right-lower-leg',
};

// Joint name → VRM bone (for world-position extraction)
const VRM_BONE_FOR_JOINT = {
  'hips':             VRMHumanBoneName.Hips,
  'spine-middle':     VRMHumanBoneName.Chest,
  'chest':            VRMHumanBoneName.UpperChest,
  'neck':             VRMHumanBoneName.Neck,
  'head':             VRMHumanBoneName.Head,
  'left-shoulder':    VRMHumanBoneName.LeftShoulder,
  'right-shoulder':   VRMHumanBoneName.RightShoulder,
  'left-arm-upper':   VRMHumanBoneName.LeftUpperArm,
  'left-arm-lower':   VRMHumanBoneName.LeftLowerArm,
  'left-hand-wrist':  VRMHumanBoneName.LeftHand,
  'right-arm-upper':  VRMHumanBoneName.RightUpperArm,
  'right-arm-lower':  VRMHumanBoneName.RightLowerArm,
  'right-hand-wrist': VRMHumanBoneName.RightHand,
  'left-upper-leg':   VRMHumanBoneName.LeftUpperLeg,
  'left-lower-leg':   VRMHumanBoneName.LeftLowerLeg,
  'left-foot-ankle':  VRMHumanBoneName.LeftFoot,
  'right-upper-leg':  VRMHumanBoneName.RightUpperLeg,
  'right-lower-leg':  VRMHumanBoneName.RightLowerLeg,
  'right-foot-ankle': VRMHumanBoneName.RightFoot,
};

let vrm = null;
let vrmNaturalHipsY = 0.9;

const _ghostMat = new THREE.MeshStandardMaterial({
  color: 0x2244cc, emissive: 0x112266,
  transparent: true, opacity: 0.22, depthWrite: false,
  roughness: 1.0, metalness: 0.0, blending: THREE.AdditiveBlending,
});

const vrmLoader = new GLTFLoader();
vrmLoader.register(parser => new VRMLoaderPlugin(parser));
vrmLoader.load(VRM_URL, (gltf) => {
  vrm = gltf.userData.vrm;
  vrm.lookAt = undefined;
  vrm.scene.traverse(obj => {
    if (obj.isMesh) { obj.material = _ghostMat; obj.renderOrder = 1; }
  });
  // Sample natural hips height for scene positioning
  vrm.humanoid.getNormalizedBoneNode(VRMHumanBoneName.Hips).getWorldPosition(_tv);
  vrmNaturalHipsY = _tv.y;
  vrm.scene.visible = false;
  scene.add(vrm.scene);
  setupMeshCollision(vrm);
}, undefined, (e) => console.error('VRM load error:', e));

// ============================================================
// Particle geometry
// ============================================================
const geom = new THREE.BufferGeometry();
const posAttr  = new THREE.BufferAttribute(pos, 3);
const colAttr  = new THREE.BufferAttribute(col, 3);
const sizeAttr = new THREE.BufferAttribute(propSize, 1); // static — upload once
posAttr.setUsage(THREE.DynamicDrawUsage);
colAttr.setUsage(THREE.DynamicDrawUsage);
geom.setAttribute('position', posAttr);
geom.setAttribute('color', colAttr);
geom.setAttribute('aSize', sizeAttr);

const mat = new THREE.ShaderMaterial({
  uniforms: { pointSize: { value: 6.0 }, time: { value: 0.0 } },
  vertexShader: `
    attribute vec3  color;
    attribute float aSize;
    varying vec3  vColor;
    varying float vSize; // pass to frag for edge softness scaling
    uniform float pointSize;
    void main() {
      vColor = color;
      vSize  = aSize;
      vec4 mv = modelViewMatrix * vec4(position, 1.0);
      gl_PointSize = pointSize * aSize / -mv.z;
      gl_Position = projectionMatrix * mv;
    }
  `,
  fragmentShader: `
    uniform float time;
    varying vec3  vColor;
    varying float vSize;
    void main() {
      float r = length(gl_PointCoord - vec2(0.5));
      if (r > 0.5) discard;

      // Larger particles get a crisper edge; tiny ones stay soft/diffuse
      float edge  = mix(0.50, 0.30, clamp((vSize - 0.3) / 2.5, 0.0, 1.0));
      float power = mix(1.0,  1.8,  clamp((vSize - 0.3) / 2.5, 0.0, 1.0));
      float glow  = pow(1.0 - smoothstep(0.0, edge, r), power);

      // heat encodes in R channel (grey ash → orange-red ember when fast)
      float heat = vColor.r;
      // cool ash: grey; warm: orange; hot: yellow-white
      vec3 cool = vec3(0.28, 0.24, 0.20);
      vec3 warm = vec3(1.00, 0.38, 0.02);
      vec3 hot  = vec3(1.00, 0.90, 0.55);
      vec3 ashCol = mix(cool, warm, heat);
      ashCol      = mix(ashCol, hot, heat * heat);

      // Subtle flicker seeded per-particle via green channel
      float flicker = 0.88 + 0.12 * sin(time * 6.0 + vColor.g * 83.0);

      gl_FragColor = vec4(ashCol * glow * flicker, glow * (0.35 + heat * 0.65));
    }
  `,
  transparent: true,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});
const points = new THREE.Points(geom, mat);
points.frustumCulled = false;
scene.add(points);

// ============================================================
// Mesh collision — CPU skinning + grid hash each frame
// ============================================================
let meshSkel = null;
let meshBindV = null;   // bind-space vertices (pre-multiplied by bindMatrixInverse per mesh)
let meshSkinI = null;   // Uint16Array: skinIndex (4 per vertex)
let meshSkinW = null;   // Float32Array: skinWeight (4 per vertex)
let meshTri   = null;   // Uint32Array: triangle indices
let meshWorld = null;   // Float32Array: world-space vertices this frame
let meshNV = 0, meshNT = 0;

const MCELL = 0.10;                      // grid cell size (10 cm)
const MGX = 24, MGY = 32, MGZ = 16;     // grid dimensions
const MBCAP = 48;                        // max triangles per cell
const mGCnt = new Int16Array(MGX * MGY * MGZ);
const mGDat = new Uint32Array(MGX * MGY * MGZ * MBCAP);
let mGox = 0, mGoy = -0.1, mGoz = 0;   // grid world origin

// Joints used for velocity lookup (nearest joint to collision point)
const MJ_JOINTS = ['hips','spine-middle','chest','neck',
  'left-shoulder','left-arm-upper','left-arm-lower','left-hand-wrist',
  'right-shoulder','right-arm-upper','right-arm-lower','right-hand-wrist',
  'left-upper-leg','left-lower-leg','left-foot-ankle',
  'right-upper-leg','right-lower-leg','right-foot-ankle'];
const mjPA = new Float32Array(MJ_JOINTS.length * 3); // joint world positions (flat)
const mjVA = new Float32Array(MJ_JOINTS.length * 3); // joint velocities (flat)

let mirrorHipsX = 0, mirrorHipsZ = 2 * MIRROR_PLANE_Z;
let bodyActive = false;

// ============================================================
// Joint position / velocity caches (populated from VRM bone world positions)
// ============================================================
const mj      = {}; // current-frame bone world positions
const mj_prev = {}; // previous-frame (for velocity)
const mjv     = {}; // per-joint velocity

// Virtual T-pose calibration — captured automatically on first valid body frame
const calibRest = {};
let isCalibrated = false;

// --- Mesh collision setup (called once after VRM loads) ---
function setupMeshCollision(vrmRef) {
  const bv = new THREE.Vector3();
  const allPos=[], allSI=[], allSW=[], allIdx=[];
  let vOff = 0;
  vrmRef.scene.traverse(obj => {
    if (!obj.isSkinnedMesh) return;
    if (!meshSkel) meshSkel = obj.skeleton;
    const geo = obj.geometry;
    const pos = geo.attributes.position.array;
    const si  = geo.attributes.skinIndex.array;
    const sw  = geo.attributes.skinWeight.array;
    const nv  = pos.length / 3;
    const bmi = obj.bindMatrixInverse;
    for (let i = 0; i < nv; i++) {
      bv.set(pos[i*3], pos[i*3+1], pos[i*3+2]);
      bv.applyMatrix4(bmi);
      allPos.push(bv.x, bv.y, bv.z);
      allSI.push(si[i*4]||0, si[i*4+1]||0, si[i*4+2]||0, si[i*4+3]||0);
      allSW.push(sw[i*4]||0, sw[i*4+1]||0, sw[i*4+2]||0, sw[i*4+3]||0);
    }
    if (geo.index) {
      for (const idx of geo.index.array) allIdx.push(idx + vOff);
    } else {
      for (let i = 0; i < nv; i++) allIdx.push(i + vOff);
    }
    vOff += nv;
  });
  meshNV = vOff; meshNT = allIdx.length / 3;
  meshBindV = new Float32Array(allPos);
  meshSkinI = new Uint16Array(allSI);
  meshSkinW = new Float32Array(allSW);
  meshTri   = new Uint32Array(allIdx);
  meshWorld = new Float32Array(meshNV * 3);
  console.log(`Mesh collision: ${meshNV} verts, ${meshNT} tris`);
}

// --- Per-frame CPU skinning ---
function skinMesh() {
  meshSkel.update();
  const bm = meshSkel.boneMatrices;
  for (let i = 0; i < meshNV; i++) {
    const ix = i*3, si4 = i*4;
    const lx = meshBindV[ix], ly = meshBindV[ix+1], lz = meshBindV[ix+2];
    let fx=0, fy=0, fz=0;
    for (let j = 0; j < 4; j++) {
      const w = meshSkinW[si4+j]; if (w <= 0) continue;
      const m = meshSkinI[si4+j] * 16;
      fx += w*(bm[m]*lx + bm[m+4]*ly + bm[m+8]*lz  + bm[m+12]);
      fy += w*(bm[m+1]*lx + bm[m+5]*ly + bm[m+9]*lz  + bm[m+13]);
      fz += w*(bm[m+2]*lx + bm[m+6]*ly + bm[m+10]*lz + bm[m+14]);
    }
    meshWorld[ix]=fx; meshWorld[ix+1]=fy; meshWorld[ix+2]=fz;
  }
}

// --- Per-frame spatial grid rebuild ---
function buildMeshGrid() {
  mGox = mirrorHipsX - MGX*MCELL*0.5;
  mGoy = -0.1;
  mGoz = mirrorHipsZ - MGZ*MCELL*0.5;
  mGCnt.fill(0);
  const v = meshWorld, t = meshTri;
  for (let i = 0; i < meshNT; i++) {
    const ai=t[i*3]*3, bi=t[i*3+1]*3, ci=t[i*3+2]*3;
    const x0=Math.max(0,   Math.floor((Math.min(v[ai],  v[bi],  v[ci])  - mGox)/MCELL));
    const x1=Math.min(MGX-1,Math.floor((Math.max(v[ai],  v[bi],  v[ci])  - mGox)/MCELL));
    const y0=Math.max(0,   Math.floor((Math.min(v[ai+1],v[bi+1],v[ci+1])- mGoy)/MCELL));
    const y1=Math.min(MGY-1,Math.floor((Math.max(v[ai+1],v[bi+1],v[ci+1])- mGoy)/MCELL));
    const z0=Math.max(0,   Math.floor((Math.min(v[ai+2],v[bi+2],v[ci+2])- mGoz)/MCELL));
    const z1=Math.min(MGZ-1,Math.floor((Math.max(v[ai+2],v[bi+2],v[ci+2])- mGoz)/MCELL));
    for (let gx=x0;gx<=x1;gx++) for (let gy=y0;gy<=y1;gy++) for (let gz=z0;gz<=z1;gz++) {
      const gcell=(gx*MGY+gy)*MGZ+gz, cnt=mGCnt[gcell];
      if (cnt < MBCAP) { mGDat[gcell*MBCAP+cnt]=i; mGCnt[gcell]=cnt+1; }
    }
  }
}

function updateBodyCollision(frame, refSpace, dt) {
  const body = frame.body;
  if (!body || !vrm) { bodyActive = false; return; }

  const hipsSpace = body.get('hips');
  if (!hipsSpace) { bodyActive = false; return; }
  const hipsPose = frame.getPose(hipsSpace, refSpace);
  if (!hipsPose) { bodyActive = false; return; }

  // Position VRM at Z-mirrored location, same X/Y as real hips
  const hp = hipsPose.transform.position;
  vrm.scene.position.set(hp.x, hp.y - vrmNaturalHipsY, 2 * MIRROR_PLANE_Z - hp.z);
  vrm.scene.visible = true;

  // Auto-calibrate on the first frame where all major joints are available
  if (!isCalibrated) {
    let n = 0;
    for (const xrJoint of BONE_DRIVE_ORDER) {
      const s = body.get(xrJoint); if (!s) continue;
      const p = frame.getPose(s, refSpace); if (!p) continue;
      const q = p.transform.orientation;
      calibRest[xrJoint] = new THREE.Quaternion(q.x, q.y, q.z, q.w);
      n++;
    }
    if (n >= BONE_DRIVE_ORDER.length * 0.8) isCalibrated = true;
  }

  // Drive VRM bones from body tracking (relative quaternions + Y180 mirror correction)
  const pose = {};
  for (const xrJoint of BONE_DRIVE_ORDER) {
    const boneName = XR_TO_VRM[xrJoint];
    if (!boneName) continue;
    const jSpace = body.get(xrJoint);
    if (!jSpace) continue;
    const jPose = frame.getPose(jSpace, refSpace);
    if (!jPose) continue;
    const jq = jPose.transform.orientation;
    const jointQuat = new THREE.Quaternion(jq.x, jq.y, jq.z, jq.w);

    const parentXR = XR_PARENT[xrJoint];
    let finalQuat;
    if (parentXR) {
      const pSpace = body.get(parentXR);
      if (pSpace) {
        const pPose = frame.getPose(pSpace, refSpace);
        if (pPose) {
          const pq = pPose.transform.orientation;
          const parentQuat = new THREE.Quaternion(pq.x, pq.y, pq.z, pq.w);
          if (isCalibrated && calibRest[parentXR] && calibRest[xrJoint]) {
            finalQuat = calibRest[parentXR].clone()
              .multiply(parentQuat.clone().invert())
              .multiply(jointQuat)
              .multiply(calibRest[xrJoint].clone().invert());
          } else {
            finalQuat = parentQuat.clone().invert().multiply(jointQuat);
          }
          finalQuat.premultiply(_Qy180).multiply(_Qy180inv);
        }
      }
    } else {
      // Root bone (hips) — use world quat relative to rest pose
      if (isCalibrated && calibRest[xrJoint]) {
        finalQuat = jointQuat.clone().multiply(calibRest[xrJoint].clone().invert());
      } else {
        finalQuat = jointQuat.clone();
      }
      finalQuat.premultiply(_Qy180).multiply(_Qy180inv);
    }
    if (!finalQuat) continue;
    pose[boneName] = { rotation: [finalQuat.x, finalQuat.y, finalQuat.z, finalQuat.w] };
  }

  vrm.humanoid.setNormalizedPose(pose);
  vrm.update(dt);               // apply twist constraints + spring bones first
  vrm.scene.updateMatrixWorld(true);

  // Extract VRM bone world positions → mj[] and compute velocities → mjv[]
  const invDt = dt > 1e-5 ? 1 / dt : 0;
  const cl = v => Math.min(10, Math.max(-10, v));
  for (const [jointName, boneName] of Object.entries(VRM_BONE_FOR_JOINT)) {
    const boneNode = vrm.humanoid.getNormalizedBoneNode(boneName);
    if (!boneNode) continue;
    boneNode.getWorldPosition(_tv);
    const px = _tv.x, py = _tv.y, pz = _tv.z;
    if (!mj[jointName])      mj[jointName]      = { x: px, y: py, z: pz };
    if (!mj_prev[jointName]) mj_prev[jointName] = { x: px, y: py, z: pz };
    if (!mjv[jointName])     mjv[jointName]     = { x: 0, y: 0, z: 0 };
    mjv[jointName].x = cl((px - mj_prev[jointName].x) * invDt);
    mjv[jointName].y = cl((py - mj_prev[jointName].y) * invDt);
    mjv[jointName].z = cl((pz - mj_prev[jointName].z) * invDt);
    mj_prev[jointName].x = px; mj_prev[jointName].y = py; mj_prev[jointName].z = pz;
    mj[jointName].x = px;      mj[jointName].y = py;      mj[jointName].z = pz;
  }

  // Track mirror hips for particle culling zone and grid centering
  if (mj['hips']) { mirrorHipsX = mj['hips'].x; mirrorHipsZ = mj['hips'].z; }

  // CPU-skin the VRM mesh and rebuild grid for this frame
  if (meshSkel) {
    skinMesh();
    buildMeshGrid();
  }

  // Fill flat joint position/velocity arrays for nearest-joint velocity lookup
  for (let ji = 0; ji < MJ_JOINTS.length; ji++) {
    const jn = MJ_JOINTS[ji];
    const p = mj[jn], v = mjv[jn];
    if (p) { mjPA[ji*3]=p.x; mjPA[ji*3+1]=p.y; mjPA[ji*3+2]=p.z; }
    if (v) { mjVA[ji*3]=v.x; mjVA[ji*3+1]=v.y; mjVA[ji*3+2]=v.z; }
  }

  // Spawn point above VRM head
  if (mj['head']) {
    spawnX = mj['head'].x;
    spawnY = mj['head'].y + 2.5;
    spawnZ = mj['head'].z;
    floorRing.position.x = spawnX;
    floorRing.position.z = spawnZ;
  }

  bodyActive = meshSkel !== null;
}

// ============================================================
// Particle physics — tight loop over typed arrays
// ============================================================
function updateParticles(dt) {
  const dtG    = GRAVITY * dt;
  const dtAD   = AIR_DRAG * dt;    // per-particle drag = dtAD / mass
  const decay  = dt * 5.0;
  const cx = spawnX, cy = spawnY, cz = spawnZ;
  const chx = mirrorHipsX, chz = mirrorHipsZ; // cull centre at mirror hips
  const active = bodyActive;

  for (let i = 0; i < N; i++) {
    const ix = i*3, iy = ix+1, iz = ix+2;

    // Rest timer — particle parked until countdown expires, then launched
    if (restTimer[i] > 0) {
      restTimer[i] -= dt;
      if (restTimer[i] > 0) continue;
      // Launch from spawn point
      const ri = (rdHead++ & (RBUF-1)) * 3;
      const sa = Math.random() * 6.28318;
      const sr = Math.sqrt(Math.random()) * 0.5; // uniform disc, r=0.5m
      pos[ix] = cx + Math.cos(sa) * sr; pos[iy] = cy; pos[iz] = cz + Math.sin(sa) * sr;
      vel[ix] = RD[ri]; vel[iy] = RD[ri+1]; vel[iz] = RD[ri+2];
      col[iy] = Math.random(); // stable per-particle flicker seed (G channel)
      age[i] = 0;
      continue;
    }

    let px = pos[ix], py = pos[iy], pz = pos[iz];
    let vx = vel[ix], vy = vel[iy], vz = vel[iz];

    const mass = propMass[i];
    const dm_i = 1 - dtAD / mass;  // light particles drag more; heavy particles less
    vx *= dm_i;
    vy  = vy * dm_i + dtG * mass;  // heavier → stronger gravity, slower drag → faster fall
    vz *= dm_i;
    px += vx * dt;
    py += vy * dt;
    pz += vz * dt;

    // Floor contact — ash deadens immediately
    if (py < 0) {
      py = 0;
      if (vy < 0) {
        vy = -vy * RESTITUTION;        // tiny upward bounce
        vx *= FLOOR_STICK; vz *= FLOOR_STICK; // strong horizontal friction
      }
      // Park as soon as barely moving — ash settles fast
      if (vy < 0.08) {
        if (restTimer[i] <= 0) restTimer[i] = 1.5 + Math.random() * 4.5;
        px = 0; py = 0; pz = 0;
        vx = 0; vy = 0; vz = 0;
        col[ix] = 0; col[iy] = 0; col[iz] = 0;
        pos[ix]=px; pos[iy]=py; pos[iz]=pz;
        vel[ix]=0; vel[iy]=0; vel[iz]=0;
        continue;
      }
    }

    // Mesh SDF body collision — closest-point-on-triangle + spatial grid
    if (active) {
      const ddx = px-chx, ddz = pz-chz;
      if (ddx*ddx + ddz*ddz < CULL_R2 && py > -0.1 && py < 2.7) {
        const GR = MCELL; // search radius (one grid cell = 10 cm)
        const gx0=Math.max(0,    Math.floor((px-GR-mGox)/MCELL));
        const gx1=Math.min(MGX-1,Math.floor((px+GR-mGox)/MCELL));
        const gy0=Math.max(0,    Math.floor((py-GR-mGoy)/MCELL));
        const gy1=Math.min(MGY-1,Math.floor((py+GR-mGoy)/MCELL));
        const gz0=Math.max(0,    Math.floor((pz-GR-mGoz)/MCELL));
        const gz1=Math.min(MGZ-1,Math.floor((pz+GR-mGoz)/MCELL));

        let bestD2=1e9, bestTi=-1, bNpx=0,bNpy=0,bNpz=0;
        for (let gx=gx0;gx<=gx1;gx++) for (let gy=gy0;gy<=gy1;gy++) for (let gz=gz0;gz<=gz1;gz++) {
          const gcell=(gx*MGY+gy)*MGZ+gz, cnt=mGCnt[gcell], base=gcell*MBCAP;
          for (let ki=0;ki<cnt;ki++) {
            const ti=mGDat[base+ki];
            const tAi=meshTri[ti*3]*3, tBi=meshTri[ti*3+1]*3, tCi=meshTri[ti*3+2]*3;
            const Tax=meshWorld[tAi],  Tay=meshWorld[tAi+1], Taz=meshWorld[tAi+2];
            const Tbx=meshWorld[tBi],  Tby=meshWorld[tBi+1], Tbz=meshWorld[tBi+2];
            const Tcx=meshWorld[tCi],  Tcy=meshWorld[tCi+1], Tcz=meshWorld[tCi+2];
            // Ericson closest point on triangle
            const ABx=Tbx-Tax,ABy=Tby-Tay,ABz=Tbz-Taz;
            const ACx=Tcx-Tax,ACy=Tcy-Tay,ACz=Tcz-Taz;
            const APx=px-Tax, APy=py-Tay, APz=pz-Taz;
            const d1=ABx*APx+ABy*APy+ABz*APz, d2=ACx*APx+ACy*APy+ACz*APz;
            let Npx,Npy,Npz;
            if (d1<=0&&d2<=0) { Npx=Tax;Npy=Tay;Npz=Taz; }
            else {
              const BPx=px-Tbx,BPy=py-Tby,BPz=pz-Tbz;
              const d3=ABx*BPx+ABy*BPy+ABz*BPz, d4=ACx*BPx+ACy*BPy+ACz*BPz;
              if (d3>=0&&d4<=d3) { Npx=Tbx;Npy=Tby;Npz=Tbz; }
              else {
                const CPx=px-Tcx,CPy=py-Tcy,CPz=pz-Tcz;
                const d5=ABx*CPx+ABy*CPy+ABz*CPz, d6=ACx*CPx+ACy*CPy+ACz*CPz;
                if (d6>=0&&d5<=d6) { Npx=Tcx;Npy=Tcy;Npz=Tcz; }
                else {
                  const vc=d1*d4-d3*d2;
                  if (vc<=0&&d1>=0&&d3<=0) {
                    const tv=d1/(d1-d3); Npx=Tax+tv*ABx;Npy=Tay+tv*ABy;Npz=Taz+tv*ABz;
                  } else {
                    const vb=d5*d2-d1*d6;
                    if (vb<=0&&d2>=0&&d6<=0) {
                      const tw=d2/(d2-d6); Npx=Tax+tw*ACx;Npy=Tay+tw*ACy;Npz=Taz+tw*ACz;
                    } else {
                      const va=d3*d6-d5*d4, denom=1/(va+vb+vc);
                      const tv=vb*denom, tw=vc*denom;
                      Npx=Tax+tv*ABx+tw*ACx; Npy=Tay+tv*ABy+tw*ACy; Npz=Taz+tv*ABz+tw*ACz;
                    }
                  }
                }
              }
            }
            const ex=px-Npx,ey=py-Npy,ez=pz-Npz, d2t=ex*ex+ey*ey+ez*ez;
            if (d2t<bestD2) { bestD2=d2t; bestTi=ti; bNpx=Npx; bNpy=Npy; bNpz=Npz; }
          }
        }

        if (bestTi >= 0 && bestD2 < 0.0009) { // 3 cm threshold
          const tAi=meshTri[bestTi*3]*3, tBi=meshTri[bestTi*3+1]*3, tCi=meshTri[bestTi*3+2]*3;
          const Tax=meshWorld[tAi],Tay=meshWorld[tAi+1],Taz=meshWorld[tAi+2];
          const Tbx=meshWorld[tBi],Tby=meshWorld[tBi+1],Tbz=meshWorld[tBi+2];
          const Tcx=meshWorld[tCi],Tcy=meshWorld[tCi+1],Tcz=meshWorld[tCi+2];
          const e1x=Tbx-Tax,e1y=Tby-Tay,e1z=Tbz-Taz;
          const e2x=Tcx-Tax,e2y=Tcy-Tay,e2z=Tcz-Taz;
          const fnx=e1y*e2z-e1z*e2y, fny=e1z*e2x-e1x*e2z, fnz=e1x*e2y-e1y*e2x;
          const flen=Math.sqrt(fnx*fnx+fny*fny+fnz*fnz);
          if (flen > 1e-8) {
            const ex=px-bNpx, ey=py-bNpy, ez=pz-bNpz;
            const sgn = ex*fnx+ey*fny+ez*fnz; // >0 = outside mesh
            const fi = 1/flen;
            let nx=fnx*fi, ny=fny*fi, nz=fnz*fi;
            if (sgn < 0) { nx=-nx; ny=-ny; nz=-nz; } // inside: flip to push outward
            const dist = Math.sqrt(bestD2);
            const sdf = sgn < 0 ? -dist : dist;       // signed distance
            if (sdf < 0.001) {                         // inside or within 1 mm
              const push = 0.001 - sdf;
              px += nx*push; py += ny*push; pz += nz*push;
              // find nearest joint for velocity
              let nj=0, njd2=1e9;
              for (let ji=0;ji<MJ_JOINTS.length;ji++) {
                const dx=mjPA[ji*3]-bNpx, dy=mjPA[ji*3+1]-bNpy, dz=mjPA[ji*3+2]-bNpz;
                const jd2=dx*dx+dy*dy+dz*dz;
                if (jd2<njd2) { njd2=jd2; nj=ji; }
              }
              const jvx=mjVA[nj*3], jvy=mjVA[nj*3+1], jvz=mjVA[nj*3+2];
              const rvx=vx-jvx, rvy=vy-jvy, rvz=vz-jvz;
              const vnr=rvx*nx+rvy*ny+rvz*nz;
              if (vnr < 0) {
                vx=jvx+(rvx-vnr*nx)*BODY_STICK;
                vy=jvy+(rvy-vnr*ny)*BODY_STICK;
                vz=jvz+(rvz-vnr*nz)*BODY_STICK;
              }
              age[i]=1;
            }
          }
        }
      }
    }

    pos[ix]=px; pos[iy]=py; pos[iz]=pz;
    vel[ix]=vx; vel[iy]=vy; vel[iz]=vz;

    // Color: R = heat (grey→ember glow), G = per-particle flicker seed (static-ish)
    let ag = age[i];
    if (ag > 0) { ag -= decay; if (ag < 0) ag = 0; age[i] = ag; }
    const speed2 = vx*vx + vy*vy + vz*vz;
    const heat = Math.min(1, speed2 * 0.08 * propGlow[i] + ag * 0.5); // per-particle glow sensitivity
    col[ix] = heat;  // R: heat level (cool grey → orange-yellow ember in shader)
    // col[iy] preserved — flicker seed set once at launch
    col[iz] = 0;
  }

  posAttr.needsUpdate = true;
  colAttr.needsUpdate = true;
}

// ============================================================
// HUD
// ============================================================
const hudCvs = document.createElement('canvas');
hudCvs.width = 512; hudCvs.height = 64;
const hudCtx = hudCvs.getContext('2d');
const hudTex = new THREE.CanvasTexture(hudCvs);
const hudMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(0.55, 0.07),
  new THREE.MeshBasicMaterial({ map: hudTex, transparent: true, opacity: 0.7, depthWrite: false })
);
hudMesh.position.set(0, 2.4, -1.3);
scene.add(hudMesh);

let lastHudState = null;
function drawHUD(active) {
  if (active === lastHudState) return;
  lastHudState = active;
  hudCtx.clearRect(0, 0, 512, 64);
  hudCtx.fillStyle = active ? '#44ff88' : '#ff6644';
  hudCtx.font = 'bold 30px monospace';
  hudCtx.textAlign = 'center';
  hudCtx.fillText(active ? 'Mirror Body Active — look ahead' : 'No Body Tracking', 256, 44);
  hudTex.needsUpdate = true;
}
drawHUD(false);

// ============================================================
// WebXR
// ============================================================
const enterBtn = document.getElementById('enterVR');
if (navigator.xr) {
  navigator.xr.isSessionSupported('immersive-vr').then(ok => {
    enterBtn.disabled = !ok;
    if (!ok) enterBtn.textContent = 'VR Not Supported';
  });
} else {
  enterBtn.textContent = 'WebXR Not Available';
}

let xrSession = null;
let thumbstickWasPressed = false;

enterBtn.addEventListener('click', async () => {
  try {
    const session = await navigator.xr.requestSession('immersive-vr', {
      optionalFeatures: ['body-tracking', 'local-floor', 'bounded-floor']
    });
    xrSession = session;
    renderer.xr.setSession(session);
    session.addEventListener('end', () => { xrSession = null; enterBtn.textContent = 'Enter VR'; });
    enterBtn.textContent = 'In VR';
  } catch(e) { console.error(e); }
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============================================================
// Render loop
// ============================================================
let lastTs = 0;
renderer.setAnimationLoop((ts, frame) => {
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;

  if (frame && renderer.xr.isPresenting) {
    const refSpace = renderer.xr.getReferenceSpace();
    // Fallback before body tracking: spawn at mirror image of viewer head
    const viewerPose = frame.getViewerPose(refSpace);
    if (viewerPose) {
      const p = viewerPose.transform.position;
      spawnX = p.x; spawnY = p.y + 2.5; spawnZ = 2 * MIRROR_PLANE_Z - p.z;
      floorRing.position.x = p.x; floorRing.position.z = 2 * MIRROR_PLANE_Z - p.z;
    }
    updateBodyCollision(frame, refSpace, dt);

    // Right thumbstick — redo calibration
    if (xrSession) {
      for (const src of xrSession.inputSources) {
        if (!src.gamepad || src.handedness !== 'right') continue;
        const pressed = src.gamepad.buttons[3]?.pressed ?? false;
        if (pressed && !thumbstickWasPressed) isCalibrated = false;
        thumbstickWasPressed = pressed;
      }
    }

    drawHUD(bodyActive);
  }

  mat.uniforms.time.value = ts / 1000;
  updateParticles(dt);
  renderer.render(scene, camera);
});
</script>
</body>
</html>

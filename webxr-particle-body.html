<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebXR Particle Body</title>
<style>
  body { margin: 0; background: #020208; overflow: hidden; }
  #enterVR {
    position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
    padding: 16px 32px; font-size: 18px; background: #44aaff; color: #000;
    border: none; border-radius: 8px; cursor: pointer; z-index: 10;
  }
  #enterVR:disabled { opacity: 0.4; cursor: default; }
  #info {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    text-align: center; color: #334; font-size: 13px; font-family: sans-serif;
  }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js"
  }
}
</script>
</head>
<body>
<div id="info">Particle Body Mirror — Quest 3 · chrome://flags → WebXR Experiments<br><small>A mirror of your body appears 2 m ahead — particles rain down and bounce off its shape</small></div>
<button id="enterVR" disabled>Enter VR</button>

<script type="module">
import * as THREE from 'three';

// ============================================================
// Config — tune N down if frame-rate drops
// ============================================================
const N           = 200_000; // particle count
const GRAVITY     = -1.2;    // m/s² — gentle ash drift
const AIR_DRAG    =  1.8;    // s⁻¹ — linear drag; terminal velocity ≈ GRAVITY/AIR_DRAG ≈ 0.67 m/s
const RESTITUTION = 0.04;    // nearly no bounce — ash deadens on impact
const BODY_STICK  = 0.08;    // tangential velocity retained on body contact
const FLOOR_STICK = 0.15;    // horizontal velocity retained on floor contact
const SPAWN_R     = 2.0;     // rain radius around body centre (m)
const SPAWN_Y     = 4.5;     // rain spawn height (m above floor)
const CULL_R2         = 1.6*1.6; // collision zone (XZ distance² from mirror hips)
const MIRROR_PLANE_Z  = -1.5;    // world-Z of the mirror surface (halfway between user and image)

// ============================================================
// Pre-computed respawn table — avoids Math.random/cos in the hot loop
// ============================================================
const RBUF = 8192;
const RD = new Float32Array(RBUF * 3); // vx, vy, vz — random spherical kick
for (let i = 0; i < RBUF; i++) {
  const theta = Math.random() * 6.28318;
  const phi   = Math.acos(2 * Math.random() - 1); // uniform sphere
  const speed = 0.04 + Math.random() * 0.12; // gentle ash dispersal
  RD[i*3+0] = Math.sin(phi) * Math.cos(theta) * speed;
  RD[i*3+1] = Math.sin(phi) * Math.sin(theta) * speed;
  RD[i*3+2] = Math.cos(phi) * speed;
}
let rdHead = 0;

// ============================================================
// Particle state (flat typed arrays)
// ============================================================
const pos = new Float32Array(N * 3);
const vel = new Float32Array(N * 3);
const col = new Float32Array(N * 3);
const age      = new Float32Array(N); // bounce flash [0..1], decays to 0
const restTimer = new Float32Array(N); // seconds until next launch; >0 = parked invisible

let spawnX = 0, spawnY = 4.5, spawnZ = 2 * MIRROR_PLANE_Z; // updated each frame from mirrored head joint

// Stagger initial launches so they trickle out rather than burst all at once
for (let i = 0; i < N; i++) {
  pos[i*3] = spawnX; pos[i*3+1] = spawnY; pos[i*3+2] = spawnZ;
  vel[i*3] = 0; vel[i*3+1] = 0; vel[i*3+2] = 0;
  col[i*3] = 0; col[i*3+1] = 0; col[i*3+2] = 0;          // invisible until launched
  restTimer[i] = Math.random() * 12.0;                      // staggered 0-12s delay
}

// ============================================================
// Scene
// ============================================================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020208);
scene.fog = new THREE.FogExp2(0x020208, 0.12);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 30);
camera.position.set(0, 1.5, 0.5);   // user viewpoint — looking at mirror body ahead
camera.lookAt(0, 1.2, 2 * MIRROR_PLANE_Z);

const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.xr.enabled = true;
renderer.xr.setReferenceSpaceType('local-floor');
document.body.appendChild(renderer.domElement);

// Subtle floor ring — visual ground reference
const floorRing = new THREE.Mesh(
  new THREE.RingGeometry(0.05, 2.2, 80),
  new THREE.MeshBasicMaterial({ color: 0x0a0a22, transparent: true, opacity: 0.6, side: THREE.DoubleSide })
);
floorRing.rotation.x = -Math.PI / 2;
floorRing.position.set(0, 0.001, 2 * MIRROR_PLANE_Z);
scene.add(floorRing);

// ============================================================
// Particle geometry
// ============================================================
const geom = new THREE.BufferGeometry();
const posAttr = new THREE.BufferAttribute(pos, 3);
const colAttr = new THREE.BufferAttribute(col, 3);
posAttr.setUsage(THREE.DynamicDrawUsage);
colAttr.setUsage(THREE.DynamicDrawUsage);
geom.setAttribute('position', posAttr);
geom.setAttribute('color', colAttr);

const mat = new THREE.ShaderMaterial({
  uniforms: { pointSize: { value: 7.0 }, time: { value: 0.0 } },
  vertexShader: `
    attribute vec3 color;
    varying vec3 vColor;
    uniform float pointSize;
    void main() {
      vColor = color;
      vec4 mv = modelViewMatrix * vec4(position, 1.0);
      gl_PointSize = pointSize / -mv.z;
      gl_Position = projectionMatrix * mv;
    }
  `,
  fragmentShader: `
    uniform float time;
    varying vec3 vColor;
    void main() {
      float r = length(gl_PointCoord - vec2(0.5));
      if (r > 0.5) discard;

      // Soft disc, slightly harder edge for ash flakes
      float glow = pow(1.0 - smoothstep(0.0, 0.48, r), 1.2);

      // heat encodes in R channel (grey ash → orange-red ember when fast)
      float heat = vColor.r;
      // cool ash: grey; warm: orange; hot: yellow-white
      vec3 cool = vec3(0.28, 0.24, 0.20);
      vec3 warm = vec3(1.00, 0.38, 0.02);
      vec3 hot  = vec3(1.00, 0.90, 0.55);
      vec3 ashCol = mix(cool, warm, heat);
      ashCol      = mix(ashCol, hot, heat * heat);

      // Subtle flicker seeded per-particle via green channel
      float flicker = 0.88 + 0.12 * sin(time * 6.0 + vColor.g * 83.0);

      gl_FragColor = vec4(ashCol * glow * flicker, glow * (0.35 + heat * 0.65));
    }
  `,
  transparent: true,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});
const points = new THREE.Points(geom, mat);
points.frustumCulled = false;
scene.add(points);

// ============================================================
// Body segments to collide against [jointA, jointB, radius]
// ============================================================
const COLL_SEGS = [
  ['hips',             'spine-middle',      0.20],
  ['spine-middle',     'chest',             0.18],
  ['chest',            'neck',              0.09],
  ['left-shoulder',    'left-arm-upper',    0.08],
  ['left-arm-upper',   'left-arm-lower',    0.07],
  ['left-arm-lower',   'left-hand-wrist',   0.055],
  ['right-shoulder',   'right-arm-upper',   0.08],
  ['right-arm-upper',  'right-arm-lower',   0.07],
  ['right-arm-lower',  'right-hand-wrist',  0.055],
  ['left-upper-leg',   'left-lower-leg',    0.09],
  ['left-lower-leg',   'left-foot-ankle',   0.07],
  ['right-upper-leg',  'right-lower-leg',   0.09],
  ['right-lower-leg',  'right-foot-ankle',  0.07],
];

// ============================================================
// Armature — line skeleton drawn over the collision segments
// ============================================================
const armatureSegs = (COLL_SEGS.length + 1) * 2; // +1 for head-to-neck line
const armPos = new Float32Array(armatureSegs * 3);
const armGeom = new THREE.BufferGeometry();
const armAttr = new THREE.BufferAttribute(armPos, 3);
armAttr.setUsage(THREE.DynamicDrawUsage);
armGeom.setAttribute('position', armAttr);
const armMesh = new THREE.LineSegments(armGeom, new THREE.LineBasicMaterial({
  color: 0x2255aa,
  transparent: true,
  opacity: 0.35,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
}));
scene.add(armMesh);
armMesh.visible = false;

function updateArmature() {
  let v = 0;
  for (const [a, b] of COLL_SEGS) {
    if (mj[a] && mj[b]) {
      armPos[v++]=mj[a].x; armPos[v++]=mj[a].y; armPos[v++]=mj[a].z;
      armPos[v++]=mj[b].x; armPos[v++]=mj[b].y; armPos[v++]=mj[b].z;
    } else {
      for (let k = 0; k < 6; k++) armPos[v++] = 0;
    }
  }
  // Head sphere centre to neck
  if (mj['head'] && mj['neck']) {
    armPos[v++]=headX; armPos[v++]=headY; armPos[v++]=headZ;
    armPos[v++]=mj['neck'].x; armPos[v++]=mj['neck'].y; armPos[v++]=mj['neck'].z;
  } else { for (let k = 0; k < 6; k++) armPos[v++] = 0; }
  armAttr.needsUpdate = true;
  armGeom.setDrawRange(0, v / 3);
  armMesh.visible = bodyActive;
}

// ============================================================
// Collision capsule buffer  [ax ay az bx by bz r r²] × MAX_CAPS
// ============================================================
const MAX_CAPS = 16;
const capBuf = new Float32Array(MAX_CAPS * 8);
let numCaps = 0;

let headX = 0, headY = 1.7, headZ = 2 * MIRROR_PLANE_Z;
let mirrorHipsX = 0, mirrorHipsZ = 2 * MIRROR_PLANE_Z; // for particle AABB culling
const HEAD_R  = 0.14;
const HEAD_R2 = HEAD_R * HEAD_R;
let bodyActive = false;

function setCap(j, ax, ay, az, bx, by, bz, r) {
  const o = j * 8;
  capBuf[o]=ax; capBuf[o+1]=ay; capBuf[o+2]=az;
  capBuf[o+3]=bx; capBuf[o+4]=by; capBuf[o+5]=bz;
  capBuf[o+6]=r;  capBuf[o+7]=r*r;
}

// ============================================================
// Update capsule positions from body tracking
// ============================================================
const jp = {}; // real joint position cache
const mj = {}; // mirrored joint position cache

function mirrorJoint(name) {
  if (!jp[name]) return;
  if (!mj[name]) mj[name] = { x:0, y:0, z:0 };
  mj[name].x = jp[name].x;                          // same X (left hand stays left)
  mj[name].y = jp[name].y;                          // same Y
  mj[name].z = 2 * MIRROR_PLANE_Z - jp[name].z;     // Z-reflected through mirror plane
}

function updateBodyCollision(frame, refSpace) {
  const body = frame.body;
  if (!body) { bodyActive = false; return; }

  for (const [name, space] of body) {
    const pose = frame.getPose(space, refSpace);
    if (pose) {
      const p = pose.transform.position;
      if (!jp[name]) jp[name] = { x:0, y:0, z:0 };
      jp[name].x = p.x; jp[name].y = p.y; jp[name].z = p.z;
    }
  }

  // Compute mirrored skeleton
  for (const name of Object.keys(jp)) mirrorJoint(name);

  // Track mirror hips for culling
  if (mj['hips']) { mirrorHipsX = mj['hips'].x; mirrorHipsZ = mj['hips'].z; }

  // Build capsules from mirrored positions
  numCaps = 0;
  for (const [a, b, r] of COLL_SEGS) {
    if (mj[a] && mj[b]) {
      setCap(numCaps++, mj[a].x, mj[a].y, mj[a].z, mj[b].x, mj[b].y, mj[b].z, r);
    }
  }

  // Mirror head
  if (mj['head']) {
    headX = mj['head'].x; headY = mj['head'].y + 0.04; headZ = mj['head'].z;
    spawnX = mj['head'].x;
    spawnY = mj['head'].y + 2.5;  // well above head so ash spreads before hitting
    spawnZ = mj['head'].z;
    floorRing.position.x = spawnX;
    floorRing.position.z = spawnZ;
  }

  bodyActive = numCaps > 0;
  updateArmature();
}

// ============================================================
// Particle physics — tight loop over typed arrays
// ============================================================
function updateParticles(dt) {
  const dtG   = GRAVITY * dt;
  const dm    = 1 - AIR_DRAG * dt; // linear drag multiplier (~0.971 at 60 fps)
  const decay = dt * 5.0;
  const cx = spawnX, cy = spawnY, cz = spawnZ;
  const chx = mirrorHipsX, chz = mirrorHipsZ; // cull centre at mirror hips
  const nc = numCaps;
  const active = bodyActive;

  for (let i = 0; i < N; i++) {
    const ix = i*3, iy = ix+1, iz = ix+2;

    // Rest timer — particle parked until countdown expires, then launched
    if (restTimer[i] > 0) {
      restTimer[i] -= dt;
      if (restTimer[i] > 0) continue;
      // Launch from spawn point
      const ri = (rdHead++ & (RBUF-1)) * 3;
      pos[ix] = cx; pos[iy] = cy; pos[iz] = cz;
      vel[ix] = RD[ri]; vel[iy] = RD[ri+1]; vel[iz] = RD[ri+2];
      col[iy] = Math.random(); // stable per-particle flicker seed (G channel)
      age[i] = 0;
      continue;
    }

    let px = pos[ix], py = pos[iy], pz = pos[iz];
    let vx = vel[ix], vy = vel[iy], vz = vel[iz];

    vx *= dm;
    vy  = vy * dm + dtG; // drag + gravity; limits fall speed to ~0.67 m/s
    vz *= dm;
    px += vx * dt;
    py += vy * dt;
    pz += vz * dt;

    // Floor contact — ash deadens immediately
    if (py < 0) {
      py = 0;
      if (vy < 0) {
        vy = -vy * RESTITUTION;        // tiny upward bounce
        vx *= FLOOR_STICK; vz *= FLOOR_STICK; // strong horizontal friction
      }
      // Park as soon as barely moving — ash settles fast
      if (vy < 0.08) {
        if (restTimer[i] <= 0) restTimer[i] = 1.5 + Math.random() * 4.5;
        px = 0; py = 0; pz = 0;
        vx = 0; vy = 0; vz = 0;
        col[ix] = 0; col[iy] = 0; col[iz] = 0;
        pos[ix]=px; pos[iy]=py; pos[iz]=pz;
        vel[ix]=0; vel[iy]=0; vel[iz]=0;
        continue;
      }
    }

    // Collision — only check particles near the mirror body
    if (active) {
      const ddx = px-chx, ddz = pz-chz;
      if (ddx*ddx + ddz*ddz < CULL_R2 && py > 0 && py < 2.7) {
        let hit = false;

        // Capsule checks
        for (let j = 0; j < nc && !hit; j++) {
          const o = j * 8;
          const ax=capBuf[o],   ay=capBuf[o+1], az=capBuf[o+2];
          const bx=capBuf[o+3], by=capBuf[o+4], bz=capBuf[o+5];
          const r=capBuf[o+6],  r2=capBuf[o+7];
          const abx=bx-ax, aby=by-ay, abz=bz-az;
          const ab2 = abx*abx + aby*aby + abz*abz;
          let t = ab2 > 1e-8 ? ((px-ax)*abx+(py-ay)*aby+(pz-az)*abz)/ab2 : 0;
          if (t < 0) t=0; else if (t > 1) t=1;
          const qx=ax+t*abx, qy=ay+t*aby, qz=az+t*abz;
          const ex=px-qx, ey=py-qy, ez=pz-qz;
          const d2 = ex*ex + ey*ey + ez*ez;
          if (d2 < r2 && d2 > 1e-10) {
            const inv = 1/Math.sqrt(d2);
            const nx=ex*inv, ny=ey*inv, nz=ez*inv;
            px=qx+nx*r; py=qy+ny*r; pz=qz+nz*r;
            // Ash sticks: kill normal velocity, heavily damp tangential
            const vn=vx*nx+vy*ny+vz*nz;
            if (vn < 0) {
              // Remove normal component entirely (no bounce), retain tiny tangential slide
              vx = (vx - vn*nx) * BODY_STICK;
              vy = (vy - vn*ny) * BODY_STICK;
              vz = (vz - vn*nz) * BODY_STICK;
            }
            age[i] = 1;
            hit = true;
          }
        }

        // Head sphere
        if (!hit) {
          const hx=px-headX, hy=py-headY, hz=pz-headZ;
          const hd2 = hx*hx + hy*hy + hz*hz;
          if (hd2 < HEAD_R2 && hd2 > 1e-10) {
            const inv = 1/Math.sqrt(hd2);
            const nx=hx*inv, ny=hy*inv, nz=hz*inv;
            px=headX+nx*HEAD_R; py=headY+ny*HEAD_R; pz=headZ+nz*HEAD_R;
            const vn=vx*nx+vy*ny+vz*nz;
            if (vn < 0) {
              vx = (vx - vn*nx) * BODY_STICK;
              vy = (vy - vn*ny) * BODY_STICK;
              vz = (vz - vn*nz) * BODY_STICK;
            }
            age[i] = 1;
          }
        }
      }
    }

    pos[ix]=px; pos[iy]=py; pos[iz]=pz;
    vel[ix]=vx; vel[iy]=vy; vel[iz]=vz;

    // Color: R = heat (grey→ember glow), G = per-particle flicker seed (static-ish)
    let ag = age[i];
    if (ag > 0) { ag -= decay; if (ag < 0) ag = 0; age[i] = ag; }
    const speed2 = vx*vx + vy*vy + vz*vz;
    const heat = Math.min(1, speed2 * 0.08 + ag * 0.5); // grey at fall speed; glow on hard impact
    col[ix] = heat;  // R: heat level (cool grey → orange-yellow ember in shader)
    // col[iy] preserved — flicker seed set once at launch
    col[iz] = 0;
  }

  posAttr.needsUpdate = true;
  colAttr.needsUpdate = true;
}

// ============================================================
// HUD
// ============================================================
const hudCvs = document.createElement('canvas');
hudCvs.width = 512; hudCvs.height = 64;
const hudCtx = hudCvs.getContext('2d');
const hudTex = new THREE.CanvasTexture(hudCvs);
const hudMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(0.55, 0.07),
  new THREE.MeshBasicMaterial({ map: hudTex, transparent: true, opacity: 0.7, depthWrite: false })
);
hudMesh.position.set(0, 2.4, -1.3);
scene.add(hudMesh);

let lastHudState = null;
function drawHUD(active) {
  if (active === lastHudState) return;
  lastHudState = active;
  hudCtx.clearRect(0, 0, 512, 64);
  hudCtx.fillStyle = active ? '#44ff88' : '#ff6644';
  hudCtx.font = 'bold 30px monospace';
  hudCtx.textAlign = 'center';
  hudCtx.fillText(active ? 'Mirror Body Active — look ahead' : 'No Body Tracking', 256, 44);
  hudTex.needsUpdate = true;
}
drawHUD(false);

// ============================================================
// WebXR
// ============================================================
const enterBtn = document.getElementById('enterVR');
if (navigator.xr) {
  navigator.xr.isSessionSupported('immersive-vr').then(ok => {
    enterBtn.disabled = !ok;
    if (!ok) enterBtn.textContent = 'VR Not Supported';
  });
} else {
  enterBtn.textContent = 'WebXR Not Available';
}

enterBtn.addEventListener('click', async () => {
  try {
    const session = await navigator.xr.requestSession('immersive-vr', {
      optionalFeatures: ['body-tracking', 'local-floor', 'bounded-floor']
    });
    renderer.xr.setSession(session);
    session.addEventListener('end', () => { enterBtn.textContent = 'Enter VR'; });
    enterBtn.textContent = 'In VR';
  } catch(e) { console.error(e); }
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============================================================
// Render loop
// ============================================================
let lastTs = 0;
renderer.setAnimationLoop((ts, frame) => {
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;

  if (frame && renderer.xr.isPresenting) {
    const refSpace = renderer.xr.getReferenceSpace();
    // Fallback before body tracking: spawn at mirror image of viewer head
    const viewerPose = frame.getViewerPose(refSpace);
    if (viewerPose) {
      const p = viewerPose.transform.position;
      spawnX = p.x; spawnY = p.y + 2.5; spawnZ = 2 * MIRROR_PLANE_Z - p.z;
      floorRing.position.x = p.x; floorRing.position.z = 2 * MIRROR_PLANE_Z - p.z;
    }
    updateBodyCollision(frame, refSpace);
    drawHUD(bodyActive);
  }

  mat.uniforms.time.value = ts / 1000;
  updateParticles(dt);
  renderer.render(scene, camera);
});
</script>
</body>
</html>
